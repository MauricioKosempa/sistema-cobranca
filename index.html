function abrirImportClientes() {
  openModal(`
    <h2>📥 Importar Cadastro de Clientes</h2>
    <div class="alert alert-info" style="margin-bottom:12px">
      ℹ️ Colunas reconhecidas: <b>Nome</b>, <b>CPF/CNPJ</b>, <b>E-mail</b>, <b>E-mail 2</b>, <b>E-mail 3</b>,
      <b>E-mail Jurídico</b>, <b>WhatsApp</b>, <b>Vendedor</b>, <b>Situação</b>, <b>Observações</b>.<br>
      ▸ Clientes com o mesmo nome serão <b>atualizados</b>. Clientes novos serão criados.
    </div>
    <div class="drop-zone" id="dz-cli" onclick="document.getElementById('fi-cli').click()"
      ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')"
      ondrop="handleDropCli(event)" style="cursor:pointer;padding:32px;text-align:center;border:2px dashed var(--border);border-radius:10px">
      <div style="font-size:36px">📂</div>
      <p style="margin:8px 0 4px">Clique para selecionar ou arraste o arquivo Excel aqui</p>
      <p style="font-size:12px;color:#94a3b8">.xlsx / .xls</p>
    </div>
    <input type="file" id="fi-cli" accept=".xlsx,.xls" style="display:none" onchange="handleFileCli(event)">
    <div id="cli-imp-prev"></div>
  `);
}
function handleDropCli(e){e.preventDefault();document.getElementById('dz-cli').classList.remove('drag');if(e.dataTransfer.files[0])processFileClientes(e.dataTransfer.files[0]);}
function handleFileCli(e){if(e.target.files[0])processFileClientes(e.target.files[0]);}

function processFileClientes(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    let hi = 0;
    for(let i=0;i<Math.min(raw.length,10);i++){if(raw[i].filter(c=>c!=='').length>=2){hi=i;break;}}
    const headers = raw[hi].map(h=>String(h).toLowerCase().trim());
    const dataRows = raw.slice(hi+1).filter(r=>r.some(c=>c!==''));
    const mappings = {
      nome:     ['nome','razão social','razao social','cliente','empresa','nome/razão social'],
      doc:      ['cpf','cnpj','cpf/cnpj','documento','doc'],
      email:    ['e-mail','email','e-mail principal','email principal','e-mail 1','email1'],
      email2:   ['e-mail 2','email 2','email2','e-mail2','e-mail adicional','email adicional'],
      email3:   ['e-mail 3','email 3','email3','e-mail3'],
      emailJur: ['e-mail jurídico','email jurídico','email juridico','e-mail juridico','juridico','e-mail jur'],
      whats:    ['whatsapp','whats','telefone','celular','fone','tel'],
      vendedor: ['vendedor','representante','rep','vend'],
      situacao: ['situação','situacao','status'],
      obs:      ['observações','observacoes','obs','notas','observação']
    };
    const colMap = {};
    Object.entries(mappings).forEach(([f,keys])=>{
      const idx = headers.findIndex(h=>keys.some(k=>h===k||h.includes(k)));
      if(idx>=0) colMap[f]=idx;
    });
    window._irowsCli = dataRows;
    const colSel = Object.keys(mappings).map(f=>{
      const labels = {nome:'Nome/Razão Social',doc:'CPF/CNPJ',email:'E-mail Principal',email2:'E-mail 2',email3:'E-mail 3',emailJur:'E-mail Jurídico',whats:'WhatsApp',vendedor:'Vendedor',situacao:'Situação',obs:'Observações'};
      return `<div class="form-group"><label>${labels[f]}</label><select id="cic-${f}">
        <option value="">(não mapear)</option>
        ${headers.map((h,i)=>`<option value="${i}" ${colMap[f]===i?'selected':''}>${h||'Col '+(i+1)}</option>`).join('')}
      </select></div>`;
    }).join('');
    document.getElementById('cli-imp-prev').innerHTML = `<hr class="divider" style="margin:16px 0">
      <div class="card-title" style="margin-bottom:12px">Mapeamento de Colunas</div>
      <div class="form-grid">${colSel}</div>
      <div class="alert alert-warning" style="margin-top:8px">⚠️ <b>${dataRows.length}</b> linha(s) encontrada(s) para importação.</div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="confirmarImportClientes()">✅ Importar Clientes</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      </div>
      <div id="cli-imp-result"></div>`;
  };
  reader.readAsBinaryString(file);
}

function getColValCli(row, field) {
  const el = document.getElementById(`cic-${field}`);
  if(!el||el.value==='') return '';
  const val = row[parseInt(el.value)];
  if(val===undefined||val===null||val==='') return '';
  return String(val).trim();
}

function confirmarImportClientes() {
  const rows = window._irowsCli || [];
  let novos=0, atualizados=0, ignorados=0;
  rows.forEach(row => {
    const nome = getColValCli(row,'nome');
    if(!nome) { ignorados++; return; }
    const email    = getColValCli(row,'email');
    const email2   = getColValCli(row,'email2');
    const email3   = getColValCli(row,'email3');
    const emailsAdicionais = [email2, email3].filter(Boolean);
    const d = {
      nome,
      doc:      getColValCli(row,'doc'),
      email,
      emailsAdicionais,
      emailJur: getColValCli(row,'emailJur'),
      whats:    getColValCli(row,'whats').replace(/\D/g,''),
      vend1:    getColValCli(row,'vendedor'),
      situacao: getColValCli(row,'situacao') || 'Ativo',
      obs:      getColValCli(row,'obs')
    };
    const existing = DB.clientes.find(c => normNome(c.nome) === normNome(nome));
    if(existing) { Object.assign(existing, d); atualizados++; }

function processFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    let hi=0;
    for(let i=0;i<Math.min(raw.length,10);i++){if(raw[i].filter(c=>c!=='').length>=3){hi=i;break;}}
    const headers=raw[hi].map(h=>String(h).toLowerCase().trim());
    const dataRows=raw.slice(hi+1).filter(r=>r.some(c=>c!==''));
    const mappings={nf:['nf','nota','número','numero','num','nota fiscal'],cliente:['cliente','razão social','razao social','nome'],vencimento:['vencimento','venc','dt venc','data vencimento'],valor:['valor','vlr','valor total','total'],vendedor:['vendedor','rep','representante'],emissao:['emissão','emissao','emis','dt emissão','data emissão'],empresa:['empresa','filial','unidade','cia','companhia'],status:['status','situação','situacao','etapa'],emTrativaCom:['em tratativa','tratativa','pendencia','pendência','area responsavel','área responsável','responsavel','responsável']};
    const colMap={};
    Object.entries(mappings).forEach(([f,keys])=>{const idx=headers.findIndex(h=>keys.some(k=>h.includes(k)));if(idx>=0)colMap[f]=idx;});
    window._irows=dataRows; window._ihdrs=headers; window._importFileName=file.name;
    const colSel=Object.keys(mappings).map(f=>`<div class="form-group"><label>${f.charAt(0).toUpperCase()+f.slice(1)}</label><select id="ci-${f}">
      <option value="">(não mapear)</option>
      ${headers.map((h,i)=>`<option value="${i}" ${colMap[f]===i?'selected':''}>${h||'Col '+(i+1)}</option>`).join('')}
    </select></div>`).join('');
    const empOpts=(DB.empresas||[]).map(e=>`<option>${e}</option>`).join('');
    document.getElementById('imp-prev').innerHTML=`<hr class="divider">
      <div class="card-title">Mapeamento de Colunas</div>
      <div class="form-grid">${colSel}</div>
      <div class="form-group" style="margin-top:4px;max-width:320px">
        <label>Empresa Padrão do Lote <span style="font-weight:400;color:var(--text-muted)">(usada quando a coluna Empresa não estiver mapeada)</span></label>
        <select id="imp-emp-padrao"><option value="">— Nenhuma —</option>${empOpts}</select>
      </div>
      <div class="alert alert-warning mt-12">⚠️ <b>${dataRows.length}</b> linhas encontradas. Clique em "Analisar" para verificar vendedores e duplicatas antes de importar.</div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="analisarImport()">🔍 Analisar e Continuar</button>
        <button class="btn btn-ghost" onclick="renderImportar()">Cancelar</button>
      </div>
      <div id="imp-analise" class="hidden"></div>`;
    document.getElementById('imp-prev').classList.remove('hidden');
  };
  reader.readAsBinaryString(file);
}

function getColVal(row,field){
  const el=document.getElementById(`ci-${field}`);
  if(!el||el.value==='') return '';
  const val=row[parseInt(el.value)];
  if(val===undefined||val===null||val==='') return '';
  if(field==='vencimento'||field==='emissao'){
    if(val instanceof Date) return val.toISOString().split('T')[0];
    if(typeof val==='number'){const d=new Date((val-25569)*86400000);return d.toISOString().split('T')[0];}
    const p=String(val).split(/[\/\-]/);
    if(p.length===3){if(p[0].length===4)return`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
      return`${p[2].length===2?'20'+p[2]:p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;}
    return String(val);
  }
  if(field==='valor'){if(typeof val==='number')return val;return parseFloat(String(val).replace(/[^\d,.-]/g,'').replace(',','.'))||0;}
  return String(val).trim();
}

/* ============================================================
   IMPORTAÇÃO – ANÁLISE (etapa 2)
   Agrupa pendências de vendedor por cliente, não por lançamento.
   Uma vez definido o vendedor do cliente, vale para todas as notas.
============================================================ */
/* ---- similaridade de nomes ---- */
function normNome(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function scoreSimilar(a,b){
  const na=normNome(a), nb=normNome(b);
  if(!na||!nb) return 0;
  if(na===nb) return 1;
  if(na.includes(nb)||nb.includes(na)) return 0.9;
  const wa=na.split(' ').filter(w=>w.length>2);
  const wb=new Set(nb.split(' ').filter(w=>w.length>2));
  const common=wa.filter(w=>wb.has(w)).length;
  const total=Math.max(wa.length, wb.size);
  return total>0 ? common/total : 0;
}
function melhorMatchVendedor(nomeplanilha){
  let best=null, bestScore=0;
  DB.vendedores.forEach(v=>{
    const s=scoreSimilar(nomeplanilha, v.nome);
    if(s>bestScore){ bestScore=s; best=v; }
  });
  return bestScore>=0.5 ? {vendedor:best, score:bestScore} : null;
}

    empresa: getColVal(row,'empresa') || empPadrao,

  window._parsed=parsed;

  // Agrupa por cliente único e classifica em: ok / sugestão / manual

        <span style="opacity:.8">ou corrija linha a linha acima.</span>
      </div>
    </div>`;
  }

  // BLOCO: Títulos já baixados como pago — sempre bloqueados
  if(dupsPago.length>0){
    html+=`<div class="card" style="border-color:#f59e0b;background:#fffbeb">
      <div class="card-title" style="color:#b45309">🔒 ${dupsPago.length} título(s) baixado(s) como <b>Pago</b> — não podem ser substituídos</div>
      <p style="font-size:13px;color:#92400e;margin-bottom:12px">
        Os títulos abaixo já estão registrados como <b>pagos</b> no sistema. Por segurança, eles serão <b>ignorados automaticamente</b> independente da opção escolhida para os demais duplicados.
        Se precisar reabrir um título pago, faça isso manualmente pelo lançamento.
      </p>
      <table><thead><tr><th>NF</th><th>Cliente</th><th>Vencimento</th><th>Valor</th><th>Situação no sistema</th></tr></thead>
      <tbody>
        ${dupsPago.map(d=>`<tr>
          <td><b>${d.nf}</b></td><td>${d.cliente}</td><td>${fmtDate(d.vencimento)}</td><td>${fmt(d.valor)}</td>
          <td><span style="background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600">✅ Pago — Bloqueado</span></td>
        </tr>`).join('')}
      </tbody></table>
    </div>`;
  }

  // BLOCO: Notas duplicadas
  if(dups.length>0){
    html+=`<div class="card" style="border-color:#fca5a5">
      <div class="card-title" style="color:var(--danger)">🔁 ${dups.length} Nota(s) já existente(s) no sistema</div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:10px">Escolha a ação para <b>todas</b> as notas duplicadas:</p>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button id="dup-btn-pular" onclick="setDupDecisao('pular')"
          style="padding:8px 18px;border-radius:8px;border:2px solid var(--primary);background:var(--primary);color:#fff;font-weight:600;cursor:pointer;font-size:13px">
          ✋ Ignorar Todos <span style="font-weight:400;opacity:.85">(manter existente)</span>
        </button>
        <button id="dup-btn-substituir" onclick="setDupDecisao('substituir')"
          style="padding:8px 18px;border-radius:8px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-weight:600;cursor:pointer;font-size:13px">
          🔄 Substituir Todos <span style="font-weight:400;opacity:.85">(pelo novo da planilha)</span>
        </button>
      </div>
      <input type="hidden" id="dup-decisao-global" value="pular">
      <table><thead><tr><th>NF</th><th>Cliente</th><th>Vencimento</th><th>Valor</th></tr></thead>
      <tbody>
        ${dups.map(d=>`<tr>
            <td><b>${d.nf}</b></td><td>${d.cliente}</td><td>${fmtDate(d.vencimento)}</td><td>${fmt(d.valor)}</td>
          </tr>`).join('')}
      </tbody></table>
    </div>`;
  }

  const temPendencia = cliSemVend.length>0 || cliSugestao.length>0;
  const temStatusInv = statusInvalidos.length > 0;
  if(!temPendencia&&dups.length===0&&!temStatusInv){
    html+=`<div class="alert alert-success">✅ Nenhum conflito encontrado. ${parsed.length} registros prontos para importar.</div>`;
  }

  html+=`<div class="form-actions" id="btns-import">
    ${temStatusInv ? '<span style="font-size:13px;color:#c2410c;font-weight:600">⚠️ Corrija os status inválidos antes de importar.</span>' :
      temPendencia ? '<span class="text-muted" style="font-size:13px">⚠️ Confirme os vínculos de vendedor antes de importar.</span>' :
      `<button class="btn btn-primary" onclick="execImportFinal()">📥 Importar ${parsed.length} Registros</button>`}
    <button class="btn btn-ghost" onclick="renderImportar()">Cancelar</button>
  </div>`;

  document.getElementById('imp-analise').innerHTML=html;
  document.getElementById('imp-analise').classList.remove('hidden');
}

function confirmarSugestao(i, modo){
  const c = (window._clientesSugestao||[])[i]; if(!c) return;
  const nomeVend = modo==='sug'
    ? document.getElementById(`sug-sel-${i}`)?.value
    : document.getElementById(`sug-man-sel-${i}`)?.value;
  if(!nomeVend){ alert('Selecione um vendedor'); return; }

  let cliDB = DB.clientes.find(x=>x.nome===c.cliente);
  if(!cliDB){ cliDB={id:uid(),nome:c.cliente,situacao:'Ativo'}; DB.clientes.push(cliDB); }
  cliDB.vend1 = nomeVend;
  // Atualiza todos os _parsed desse cliente
  (window._parsed||[]).forEach(r=>{ if(r.cliente===c.cliente) r.vendedor=nomeVend; });
  saveDB();
  document.getElementById(`sug-${i}`).style.opacity='0.5';
  document.getElementById(`sug-ok-${i}`).classList.remove('hidden');
  _checarPendentesSugestao();
}

function corrigirStatusInvalido(idx, novoStatus) {
  const parsed = window._parsed || [];
  if (parsed[idx]) parsed[idx].statusImport = novoStatus;
  // Remove da lista de inválidos se foi corrigido
  window._statusInvalidos = (window._statusInvalidos||[]).filter(si => {
    if (si.idx !== idx) return true;
    return !novoStatus; // só remove se escolheu algo
  });
  _checarPendentesSugestao();
}

function corrigirTodosStatusInvalidos(novoStatus) {
  (window._statusInvalidos||[]).forEach(si => {
    const sel = document.getElementById(`fix-status-${si.idx}`);
    if (sel) { sel.value = novoStatus; }
    const parsed = window._parsed || [];
    if (parsed[si.idx]) parsed[si.idx].statusImport = novoStatus;
  });
  window._statusInvalidos = [];
  _checarPendentesSugestao();
  // Remove o bloco visual
  const bloco = document.getElementById('bloco-status-inv');
  if (bloco) bloco.style.opacity = '0.5';
}

function _checarPendentesSugestao(){
  const total=(window._clientesSugestao||[]).length;
  const confirmados=document.querySelectorAll('[id^="sug-ok-"]:not(.hidden)').length;
  const manPendentes=(window._clientesSemVend||[]).length;
  const okEl=document.querySelectorAll('[id^="cvsv-ok-"]:not(.hidden)').length;
  const statusPendentes=(window._statusInvalidos||[]).length;
  if(confirmados>=total && okEl>=manPendentes && statusPendentes===0){
    const btns=document.getElementById('btns-import');
    if(btns) btns.innerHTML=`<button class="btn btn-primary" onclick="execImportFinal()">📥 Importar ${(window._parsed||[]).length} Registros</button>
      <button class="btn btn-ghost" onclick="renderImportar()">Cancelar</button>`;
  }
}

function vincularVendedorCliente(i){
  const cliSemVend=window._clientesSemVend||[];

  let cli=DB.clientes.find(c=>c.nome===item.cliente);
  if(cli){cli.vend1=vend1;}
  else{DB.clientes.push({id:uid(),nome:item.cliente,situacao:'Ativo',vend1});}

  // Atualiza todos os registros _parsed desse cliente
  (window._parsed||[]).forEach(r=>{if(r.cliente===item.cliente)r.vendedor=vend1;});

  saveDB();

  // UI: marca como resolvido
  document.getElementById(`cvsv-ok-${i}`).classList.remove('hidden');
  document.getElementById(`cvsv-sel-${i}`).disabled=true;
  const vincBtn=document.querySelector(`#cvsv-${i} .btn-primary`);
  if(vincBtn)vincBtn.disabled=true;

  _checarPendentesSugestao();
}

function execImportFinal(){
  const parsed=window._parsed||[];
  const dups=window._dups||[];
  let imp=0, skip=0, sub=0;
  const batchId = uid();
  const batchIds = [];

  // Collect dup decisions — single global decision for all duplicates
  const globalDec=(document.getElementById('dup-decisao-global')||{}).value||'pular';
  const decisions={};
  dups.forEach(d=>{ decisions[`${d.nf}|${d.cliente}`]=globalDec; });

  // Mapa status importação → campos da nota
  const STATUS_IMPORT_VALIDOS = window._STATUS_IMPORT_VALIDOS || {};
  function resolverStatusImport(statusStr) {
    const key = (statusStr||'').toLowerCase().trim();
    const mapped = STATUS_IMPORT_VALIDOS[key];
    // mapped = null (auto), 'cartorio', 'empcob', 'juridico', 'pago', 'aguardar', 'perdido'
    let baseStatus=null, dataCartorio=null, dataEmpCob=null, dataJuridico=null;
    if (mapped === 'cartorio')  { dataCartorio = today(); }
    if (mapped === 'empcob')    { dataEmpCob   = today(); }
    if (mapped === 'juridico')  { dataJuridico = today(); }
    if (mapped === 'pago')      { baseStatus   = 'pago'; }
    if (mapped === 'aguardar')  { baseStatus   = 'aguardar'; }
    if (mapped === 'perdido')   { baseStatus   = 'perdido'; }
    return { baseStatus, dataCartorio, dataEmpCob, dataJuridico };
  }

  parsed.forEach(r=>{
    const {nf,cliente,vendedor,vencimento,valor,emissao,empresa,statusImport,emTrativaCom}=r;
    if(!cliente&&!nf){skip++;return;}

    // Auto-criar cliente se não existir (sem duplicar)
    if(cliente&&!DB.clientes.find(c=>c.nome===cliente)){
      DB.clientes.push({id:uid(),nome:cliente,situacao:'Ativo',vend1:vendedor||''});
    }

    // Auto-criar vendedor se não existir
    if(vendedor&&!DB.vendedores.find(v=>v.nome===vendedor)){
      DB.vendedores.push({id:uid(),nome:vendedor,situacao:'Ativo'});
    }

    const statusCampos = resolverStatusImport(statusImport);

    // Verifica duplicata
    const existIdx=DB.notas.findIndex(n=>n.nf===nf&&n.cliente===cliente);
    if(existIdx>=0){
      if(DB.notas[existIdx].baseStatus==='pago'){skip++;return;}
      const dec=decisions[`${nf}|${cliente}`]||'pular';
      if(dec==='substituir'){
        const hist=DB.notas[existIdx].historico||[];
        hist.unshift({data:new Date().toISOString(),tipo:'Substituição',desc:'Nota substituída via reimportação'});
        DB.notas[existIdx]={...DB.notas[existIdx],vencimento,valor:Number(valor)||0,emissao,vendedor,
          ...statusCampos, emTrativaCom:emTrativaCom||DB.notas[existIdx].emTrativaCom||'', historico:hist};
        sub++;
      } else { skip++; }
      return;
    }

    const nId=uid();
    batchIds.push(nId);
    DB.notas.push({
      id:nId, nf, cliente, vendedor, empresa:empresa||'', emissao, vencimento,
      valor:Number(valor)||0, batchId,
      ...statusCampos,
      emTrativaCom: emTrativaCom||'',
      historico:[{data:new Date().toISOString(),tipo:'Importação',
        desc:`Importado via planilha: ${window._importFileName||'arquivo'}${statusImport?' | Status: '+statusImport:''}${emTrativaCom?' | Em tratativa: '+emTrativaCom:''}`}]
    });
    imp++;
  });

  // Registrar batch de importação
  if(imp>0){
    if(!DB.importacoes) DB.importacoes=[];
    DB.importacoes.unshift({
      id:batchId,
      data:new Date().toISOString(),
      arquivo:window._importFileName||'planilha',
      total:imp, substituidas:sub
    });
  }

  saveDB();
  let resumo=`✅ Importação concluída!\n• <b>${imp}</b> notas importadas`;
  if(sub>0) resumo+=`\n• <b>${sub}</b> nota(s) substituída(s)`;
  if(skip>0) resumo+=`\n• <b>${skip}</b> ignorada(s) (sem dados ou duplicata mantida)`;

  document.getElementById('imp-prev').innerHTML=`
    <div class="alert alert-success">${resumo}</div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="navigate('dashboard')">📊 Ver Dashboard</button>
      <button class="btn btn-ghost" onclick="renderImportar()">Importar outro arquivo</button>
    </div>`;
  document.getElementById('imp-prev').classList.remove('hidden');
}

/* ---- FATURAMENTO helpers ---- */
const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function getFatAno(ano) {
  const meses = DB.faturamento[ano] || {};
  return Object.values(meses).reduce((s,v)=>s+Number(v||0),0);
}

function getFatAcumulado(ano, ateMes) {
  const meses = DB.faturamento[ano] || {};
  let total = 0;
  for(let m=1; m<=ateMes; m++) {
    const k = String(m).padStart(2,'0');
    total += Number(meses[k]||0);
  }
  return total;
}

function salvarFaturamento(ano) {

let _fatEmpAtiva = '_todas'; // '_todas' = visão consolidada
function setFatEmpAtiva(e) { _fatEmpAtiva = e; renderParametros(); }

function getFatAnoTodas(ano) {
  const empresas = DB.empresas || [];
  return empresas.reduce((s,e) => s + getFatAnoEmp(ano, e), 0);
}
function getMesFatTodas(ano, k) {
  const empresas = DB.empresas || [];
  return empresas.reduce((s,e) => s + Number((DB.faturamentoEmp?.[e]?.[ano]||{})[k]||0), 0);
}
function getFatAcumuladoTodas(ano, ateMes) {
  let total = 0;
  for(let m=1; m<=ateMes; m++) {
    const k = String(m).padStart(2,'0');
    total += getMesFatTodas(ano, k);
  }
  return total;
}
// Retorna faturamento consolidado (todas as empresas somadas) com fallback para DB.faturamento legado
function getFatConsolidado(ano) {
  const porEmp = getFatAnoTodas(ano);
  return porEmp > 0 ? porEmp : getFatAno(ano);
}
function getFatAcumuladoConsolidado(ano, ateMes) {
  const porEmp = getFatAcumuladoTodas(ano, ateMes);
  return porEmp > 0 ? porEmp : getFatAcumulado(ano, ateMes);
}

function getFatAnoEmp(ano, emp) {
  if(!DB.faturamentoEmp) return 0;
  const meses = (DB.faturamentoEmp[emp]||{})[ano] || {};

  for(let m=1; m<=ateMes; m++) {
    const k = String(m).padStart(2,'0');

function salvarRegras(){
  const ds = parseInt(document.getElementById('cfg-diasFimSimples').value)||3;
  const da = parseInt(document.getElementById('cfg-diasFimAvancada').value)||6;
  const dp = parseInt(document.getElementById('cfg-diasProtestado').value)||16;
  const dj = parseInt(document.getElementById('cfg-diasJuridico').value)||15;
  if(da <= ds){ alert('O limite de Cobrança Avançada deve ser maior que o limite de Cobrança Simples.'); return; }
  DB.config.diasFimSimples  = ds;
  DB.config.diasFimAvancada = da;
  DB.config.diasProtestado  = dp;
  DB.config.diasJuridico    = dj;
  saveDB();
  renderParametros();
  alert('✅ Regras de dias salvas com sucesso!');
}

function saveParamAcao(tipo, isAuto) {
  // isAuto = true significa "Não" (automático); false = "Sim" (manual)
  if (tipo === 'simples') DB.config.autoSendSimples = isAuto;
  else DB.config.autoSendAvancada = isAuto;
  saveDB();
  renderParametros(); // re-render to update labels and buttons
  if (isAuto) {
    // Confirmação ao ligar automático
    setTimeout(() => {
      if (confirm(`✅ Modo automático ativado para ${tipo === 'simples' ? 'Cobrança Simples' : 'Cobrança Avançada'}.\n\nDeseja rodar o envio agora para as notas já nessa etapa?`)) {
        runAutoSend(tipo);
      }
    }, 100);
  }
}

          <select id="crm-cli" onchange="filterCRM()" style="border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px">
            <option value="">Todos os clientes</option>
            ${[...new Set((DB.crm||[]).map(c=>c.cliente))].sort().map(c=>`<option>${c}</option>`).join('')}
          </select>
          <select id="crm-emp" onchange="filterCRM()" style="border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px">

      <div class="tbl-wrap" id="crm-tbl"></div>
    </div>`;
  filterCRM();

function filterCRM() {
  const q   = (document.getElementById('crm-q')?.value||'').toLowerCase();
  const de  = document.getElementById('crm-de')?.value||'';
  const ate = document.getElementById('crm-ate')?.value||'';
  const cli = document.getElementById('crm-cli')?.value||'';
  const emp = document.getElementById('crm-emp')?.value||'';

  const entradas = (DB.crm||[]).filter(c => {
    const dia = c.data.slice(0,10);
    if (de  && dia < de)  return false;
    if (ate && dia > ate) return false;
    if (cli && c.cliente !== cli) return false;
    if (emp && c.empresa !== emp) return false;
    if (q && !`${c.nf} ${c.cliente} ${c.tratativa} ${c.vendedor}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => b.data.localeCompare(a.data)); // mais recente primeiro

  // Agrupa por dia para exibição
  const porDia = {};
  entradas.forEach(c => {
    const dia = c.data.slice(0,10);
    if (!porDia[dia]) porDia[dia] = [];
    porDia[dia].push(c);
  });

  // Resumo
  const clientesUnicos = new Set(entradas.map(c=>c.cliente)).size;
  document.getElementById('crm-resumo').innerHTML = entradas.length > 0
    ? `<div style="font-size:12px;color:var(--text-muted)">${entradas.length} tratativa(s) · ${clientesUnicos} cliente(s) · ${Object.keys(porDia).length} dia(s)</div>`
    : '';

  if (!entradas.length) {
    document.getElementById('crm-tbl').innerHTML = `<p class="text-center text-muted" style="padding:32px">Nenhuma tratativa encontrada.</p>`;
    return;
  }

  const html = Object.entries(porDia).map(([dia, items]) => {
    const diaFmt = new Date(dia+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
    const rows = items.map(c => {
      const hora = new Date(c.data).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const diasAtr = diasAtraso(c.vencimento);
      return `<tr>
        <td style="white-space:nowrap;color:var(--text-muted);font-size:12px">${hora}</td>
        <td><b>${c.nf}</b></td>
        <td>${c.cliente}</td>
        ${emp===''?`<td><span style="font-size:11px;background:var(--primary);color:#fff;padding:1px 6px;border-radius:10px">${c.empresa||'—'}</span></td>`:''}
        <td style="font-size:12px;color:var(--text-muted)">${c.vendedor||'—'}</td>
        <td style="white-space:nowrap">${fmtDate(c.vencimento)}</td>
        <td class="text-right" style="font-size:12px;color:${diasAtr>0?'var(--danger)':'var(--success)'}">${diasAtr>0?diasAtr+'d atraso':'Em dia'}</td>
        <td class="text-right">${fmt(c.valor)}</td>
        <td style="max-width:320px;word-break:break-word">${escHtml(c.tratativa)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-ghost btn-xs" onclick="editarCRM('${c.id}')" title="Editar">✏️</button>
          <button class="btn btn-ghost btn-xs" onclick="excluirCRM('${c.id}')" title="Excluir" style="color:var(--danger)">🗑️</button>
        </td>
      </tr>`;
    }).join('');
    const colEmp = emp==='' ? '<th>Empresa</th>' : '';
    return `<div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.5px;padding:6px 0;border-bottom:2px solid var(--primary);margin-bottom:8px">${diaFmt}</div>
      <table><thead><tr><th>Hora</th><th>NF</th><th>Cliente</th>${colEmp}<th>Vendedor</th><th>Vencimento</th><th class="text-right">Atraso</th><th class="text-right">Valor</th><th>Tratativa</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }).join('');
  document.getElementById('crm-tbl').innerHTML = html;
}

function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function editarCRM(id){
  const entrada=(DB.crm||[]).find(c=>c.id===id);if(!entrada)return;
  const overlay=document.createElement('div');overlay.id='crm-edit-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML=`<div style="background:var(--card);border-radius:12px;padding:24px;width:520px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-size:15px;font-weight:700;margin-bottom:4px">✏️ Editar Tratativa</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">NF ${entrada.nf} · ${entrada.cliente}</div>
    <textarea id="crm-edit-txt" style="width:100%;min-height:100px;border:1px solid var(--border);border-radius:7px;padding:10px;font-size:13px;font-family:inherit;resize:vertical">${escHtml(entrada.tratativa)}</textarea>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('crm-edit-overlay').remove()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="salvarEdicaoCRM('${id}')">💾 Salvar</button>
    </div></div>`;
  document.body.appendChild(overlay);
  document.getElementById('crm-edit-txt').focus();
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function salvarEdicaoCRM(id){
  const entrada=(DB.crm||[]).find(c=>c.id===id);if(!entrada)return;
  const novo=document.getElementById('crm-edit-txt')?.value.trim();
  if(!novo){alert('A tratativa não pode ficar vazia.');return;}
  entrada.tratativa=novo;
  const ultimaCrm=[...(DB.crm||[])].filter(c=>c.notaId===entrada.notaId).sort((a,b)=>b.data.localeCompare(a.data))[0];
  if(ultimaCrm?.id===id){const nota=DB.notas.find(n=>n.id===entrada.notaId);if(nota)nota.obs=novo;}
  saveDB();document.getElementById('crm-edit-overlay')?.remove();filterCRM();
}

function excluirCRM(id){
  if(!confirm('Excluir esta tratativa?'))return;
  DB.crm=(DB.crm||[]).filter(c=>c.id!==id);saveDB();filterCRM();
}

function exportCRM(){
  const q=(document.getElementById('crm-q')?.value||'').toLowerCase();
  const de=document.getElementById('crm-de')?.value||'';
  const ate=document.getElementById('crm-ate')?.value||'';
  const cli=document.getElementById('crm-cli')?.value||'';
  const emp=document.getElementById('crm-emp')?.value||'';
  const entradas=(DB.crm||[]).filter(c=>{
    const dia=c.data.slice(0,10);
    if(de&&dia<de)return false;if(ate&&dia>ate)return false;
    if(cli&&c.cliente!==cli)return false;if(emp&&c.empresa!==emp)return false;
    if(q&&!`${c.nf} ${c.cliente} ${c.tratativa} ${c.vendedor}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>b.data.localeCompare(a.data));
  if(!entradas.length){alert('Nenhuma tratativa para exportar.');return;}
  const rows=entradas.map(c=>({'Data/Hora':new Date(c.data).toLocaleString('pt-BR'),'NF':c.nf,'Cliente':c.cliente,'Empresa':c.empresa||'','Vendedor':c.vendedor||'','Vencimento':fmtDate(c.vencimento),'Valor':Number(c.valor||0),'Dias Atraso':diasAtraso(c.vencimento),'Tratativa':c.tratativa}));
  const ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:18},{wch:12},{wch:30},{wch:18},{wch:20},{wch:12},{wch:14},{wch:10},{wch:60}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Tratativas CRM');
  XLSX.writeFile(wb,`crm_tratativas_${today()}.xlsx`);
}

async function salvarAcessoMultiusuario(){
  const spUrl=(document.getElementById('cg-spurl').value||'').trim();
  const spPath=(document.getElementById('cg-sppath').value||'reconlog_cobranca_db.json').trim();
  const admins=(document.getElementById('cg-admins').value||'').split('\n').map(e=>e.trim().toLowerCase()).filter(Boolean);
  const gestores=(document.getElementById('cg-gestores').value||'').split('\n').map(e=>e.trim().toLowerCase()).filter(Boolean);
  const consulta=(document.getElementById('cg-consulta').value||'').split('\n').map(e=>e.trim().toLowerCase()).filter(Boolean);
  const clientId=(document.getElementById('cg-msid').value||'').trim();
  const tenantId=(document.getElementById('cg-msten').value||'common').trim();
  const antigosAdmins=DB.config.usuariosAdmin||[];
  const antigosGest=DB.config.usuariosGestores||[];
  const antigosConsulta=DB.config.usuariosConsulta||[];
  DB.config.sharePointUrl=spUrl;DB.config.onedrivePath=spPath;
  DB.config.usuariosAdmin=admins;DB.config.usuariosGestores=gestores;DB.config.usuariosConsulta=consulta;
  DB.config.msClientId=clientId;DB.config.msTenantId=tenantId;
  _spSiteId=null;_msalApp=null;_msToken=null;
  saveDB();
  const novosAdmins=admins.filter(e=>!antigosAdmins.includes(e));
  const novosGest=gestores.filter(e=>!antigosGest.includes(e));
  const novosConsulta=consulta.filter(e=>!antigosConsulta.includes(e));
  const todos=[...novosAdmins.map(e=>({e,r:'Admin'})),...novosGest.map(e=>({e,r:'Gestor'})),...novosConsulta.map(e=>({e,r:'Consulta'}))];
  if(todos.length>0) await enviarConvites(todos);
  else alert('✅ Configuração salva!');
  renderConfiguracoes();
}

async function enviarConvites(usuarios){
  const empresa=DB.config.empresaNome||'Reconlog';

  const corPerfil={Admin:'#7c3aed',Gestor:'#0284c7',Consulta:'#64748b'};
  const token=await getToken();

        </td></tr>
        <tr><td style="padding:28px 32px">
          <p style="font-size:16px;font-weight:600;color:#1a3c5e">Você foi convidado!</p>
          <p style="color:#475569">Você recebeu acesso ao Sistema de Cobrança do ${empresa}.</p>
          <div style="background:#f8fafc;border-radius:8px;padding:12px 16px;margin:16px 0">
            <span style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase">Seu perfil de acesso</span>
            <div style="margin-top:4px"><span style="background:${corPerfil[r]||'#64748b'};color:#fff;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:700">${r}</span></div>
          </div>
          <a href="${url}" style="display:inline-block;background:#0078d4;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:600;margin-top:8px">🚀 Acessar o Sistema</a>

  alert(`✅ Configuração salva!\n${ok} convite(s) enviado(s)${err?` / ${err} erro(s)`:'.'}`);

async function testarConexaoSP(){
  const el=document.getElementById('sp-status');
  el.textContent='⏳ Testando...';el.style.color='#64748b';
  _spSiteId=null;
  const siteId=await resolveSpSiteId();
  if(siteId){el.textContent=`✅ Conectado!`;el.style.color='#16a34a';}
  else{el.textContent='❌ Não foi possível conectar. Verifique a URL e as permissões do app no Azure.';el.style.color='#dc2626';}
}

function salvarMsConfig(){
  DB.config.msClientId=(document.getElementById('cg-msid2')||document.getElementById('cg-msid')).value.trim();
  DB.config.msTenantId=(document.getElementById('cg-msten2')||document.getElementById('cg-msten')).value.trim()||'common';
  DB.config.horarioRelatorio=document.getElementById('cg-hora').value;
  _msalApp=null;_msToken=null;saveDB();alert('✅ Configuração Microsoft salva!');
}

async function checkMsStatus(){
  const el=document.getElementById('ms-status');if(!el)return;
  const app=getMsalApp();if(!app){el.textContent='';return;}
  const accounts=app.getAllAccounts();
  if(accounts.length){el.textContent=`✅ Conectado como ${accounts[0].username}`;el.style.color='var(--success)';}
  else{el.textContent='Não autenticado';el.style.color='var(--text-muted)';}
}

function saveCfg(){
  const get=id=>document.getElementById(id);
  if(get('cg-msid'))DB.config.msClientId=get('cg-msid').value.trim();
  if(get('cg-msten'))DB.config.msTenantId=get('cg-msten').value.trim()||'common';
  if(get('cg-hora'))DB.config.horarioRelatorio=get('cg-hora').value;
  _msalApp=null;
  Object.assign(DB.config,{
    empresaNome:get('cg-emp').value,emailComercial:get('cg-ecom').value,
    emailJuridico:get('cg-ejur').value,emailEmpCobranca:get('cg-eemp').value,
    evoUrl:(get('cg-eu').value||'').trim().replace(/\/$/,''),
    evoInstance:(get('cg-ei').value||'').trim(),evoToken:(get('cg-et').value||'').trim(),
    emailType:get('cg-et2').value,emailFrom:(get('cg-ef').value||'').trim(),
    smtpHost:get('cg-sh')?.value||'',smtpPort:get('cg-sp')?.value||'587'
  });
  saveDB();alert('✅ Configurações salvas!');
}

function testEvo(){
  const url=(document.getElementById('cg-eu').value||'').trim().replace(/\/$/,'');
  const token=(document.getElementById('cg-et').value||'').trim();
  if(!url||!token){alert('Preencha URL e Token primeiro');return;}
  fetch(`${url}/instance/fetchInstances`,{headers:{apikey:token}})
    .then(r=>r.ok?alert('✅ Evolution API conectada!'):alert('❌ Falha. Verifique URL e Token.'))
    .catch(()=>alert('❌ Erro de rede.'));
}

function adicionarEmpresa(){
  const inp=document.getElementById('cfg-nova-emp');
  const nome=(inp?.value||'').trim();if(!nome)return alert('Digite o nome da empresa.');
  if(!DB.empresas)DB.empresas=[];
  if(DB.empresas.includes(nome))return alert('Essa empresa já está cadastrada.');
  DB.empresas.push(nome);saveDB();renderConfiguracoes();
}

function removerEmpresa(nome){
  const usadas=DB.notas.filter(n=>n.empresa===nome).length;
  if(!confirm(`Remover a empresa "${nome}"?${usadas>0?`\n\n⚠️ Existem ${usadas} lançamento(s) vinculados.`:'`'}`))return;
  DB.empresas=(DB.empresas||[]).filter(e=>e!==nome);saveDB();renderConfiguracoes();
}

function excluirImportacao(batchId,arquivo,qtd){
  if(!confirm(`⚠️ Excluir permanentemente ${qtd} lançamento(s) do arquivo "${arquivo}"?`))return;
  DB.notas=DB.notas.filter(n=>n.batchId!==batchId);saveDB();
  alert(`✅ ${qtd} lançamento(s) excluído(s).`);renderConfiguracoes();
}

function backupDB(){
  const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`backup_cobranca_${today()}.json`;a.click();
}

function restoreDB(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    if(!confirm('⚠️ Isso substituirá TODOS os dados atuais. Confirma?'))return;
    try{DB=JSON.parse(ev.target.result);saveDB();alert('✅ Backup restaurado!');navigate('dashboard');}
    catch{alert('❌ Arquivo inválido.');}
  };
  r.readAsText(f);
}

function clearDB(){
  if(!confirm('⚠️ ATENÇÃO: Isso apagará TODOS os dados permanentemente!\n\nDigite CONFIRMAR para prosseguir.'))return;
  const resp=prompt('Digite CONFIRMAR para apagar todos os dados:');
  if(resp!=='CONFIRMAR'){alert('Operação cancelada.');return;}
  DB=defaultDB();saveDB();navigate('dashboard');alert('✅ Dados limpos.');
}

window.onload=initApp;
</script>
