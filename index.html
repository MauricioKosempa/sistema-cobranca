<style>
  :root {

    --primary-light: #2563a8;
    --accent: #f59e0b;
    --danger: #dc2626;
    --success: #16a34a;
    --warning: #d97706;
    --info: #0891b2;
    --bg: #dbeafe;
    --card: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --sidebar-bg: #0f2942;
    --sidebar-text: #cbd5e1;
    --sidebar-active: #1e4d7b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
  #sidebar {
    width: var(--sidebar-w); background: var(--sidebar-bg); color: var(--sidebar-text);
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  }
  #sidebar .logo {
    padding: 20px 16px; border-bottom: 1px solid #1e4d7b;
    font-size: 15px; font-weight: 700; color: #fff; letter-spacing: .5px;
    display: flex; align-items: center; gap: 10px;
  }
  #sidebar .logo span { font-size: 22px; }
  #sidebar nav { flex: 1; overflow-y: auto; padding: 8px 0; }
  #sidebar nav a {
    display: flex; align-items: center; gap: 10px; padding: 11px 18px;
    color: var(--sidebar-text); text-decoration: none; font-size: 13.5px;
    border-left: 3px solid transparent; transition: all .15s; cursor: pointer;
  }
  #sidebar nav a:hover { background: rgba(255,255,255,.06); color: #fff; }
  #sidebar nav a.active { background: var(--sidebar-active); color: #fff; border-left-color: var(--accent); }
  #sidebar nav a .icon { width: 18px; text-align: center; font-size: 16px; }
  #sidebar .footer { padding: 14px 18px; border-top: 1px solid #1e4d7b; font-size: 11px; color: #475569; }
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  #topbar {
    background: #fff; border-bottom: 1px solid var(--border); padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50;
  }
  #topbar h1 { font-size: 17px; font-weight: 600; color: var(--primary); }
  #topbar .info { font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; align-items: center; }
  .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; }
  .toggle-wrap label { display: flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap; }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 20px; transition: .2s; cursor: pointer; }
  .toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .toggle-slider { background: var(--success); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
  #content { padding: 24px; flex: 1; }
  .card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .5px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .kpi { background: var(--card); border-radius: 10px; border: 1px solid var(--border); padding: 14px 14px; min-width: 0; }
  .kpi .label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi .value { font-size: clamp(15px, 2vw, 22px); font-weight: 700; margin-top: 4px; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi.danger .value { color: var(--danger); }
  .kpi.warning .value { color: var(--warning); }
  .kpi.success .value { color: var(--success); }
  .kpi.info .value { color: var(--info); }
  .kpi[onclick]:hover { box-shadow: 0 2px 8px rgba(0,0,0,.10); transform: translateY(-1px); transition: box-shadow .15s, transform .15s; }
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
  .tbl-wrap::-webkit-scrollbar { height: 6px; }
  .tbl-wrap::-webkit-scrollbar-track { background: transparent; }
  .tbl-wrap::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .tbl-wrap::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  #vencidos-tbl table { min-width: 1100px; }
  th { background: #f8fafc; font-weight: 600; text-align: left; padding: 9px 12px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  #vencidos-tbl td { white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-a_vencer { background: #dbeafe; color: #1d4ed8; }
  .badge-cobranca_simples { background: #fef9c3; color: #a16207; }
  .badge-cobranca_avancada { background: #ffedd5; color: #c2410c; }
  .badge-aguardando_cartorio { background: #fee2e2; color: #b91c1c; }
  .badge-enviado_cartorio { background: #fce7f3; color: #9d174d; }
  .badge-protestado { background: #ede9fe; color: #6d28d9; }
  .badge-emp_cobranca { background: #fdf2f8; color: #86198f; }
  .badge-enviar_juridico { background: #fee2e2; color: #7f1d1d; border: 1px solid #b91c1c; }
  .badge-juridico { background: #1e293b; color: #f1f5f9; }
  .badge-pago { background: #dcfce7; color: #15803d; }
  .badge-aguardar { background: #e0f2fe; color: #075985; }
  .badge-perdido { background: #f1f5f9; color: #475569; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all .15s; text-decoration: none; }
  .btn-primary { background: var(--primary-light); color: #fff; }
  .btn-primary:hover { background: var(--primary); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn-xs { padding: 2px 7px; font-size: 11px; border-radius: 5px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .form-group input, .form-group select, .form-group textarea { border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; font-size: 13px; background: #fff; color: var(--text); outline: none; transition: border .15s; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary-light); }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .form-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px; max-width: 620px; width: 95%; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; color: var(--primary); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted); }
  .vendor-row { border-bottom: 1px solid var(--border); }
  .vendor-header { display: flex; align-items: center; padding: 12px 14px; cursor: pointer; gap: 10px; transition: background .1s; }
  .vendor-header:hover { background: #f8fafc; }
  .vendor-name { font-weight: 600; font-size: 14px; flex: 1; }
  .vendor-totals { display: flex; gap: 14px; align-items: center; font-size: 13px; }
  .vendor-totals .tv { color: var(--danger); font-weight: 600; }
  .vendor-totals .pct { background: #fef2f2; color: var(--danger); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .vendor-expand { font-size: 18px; color: var(--text-muted); transition: transform .2s; margin-left: 6px; }
  .vendor-expand.open { transform: rotate(90deg); }
  .vendor-clients { display: none; background: #f8fafc; border-top: 1px solid var(--border); }
  .vendor-clients.open { display: block; }
  .vendor-clients table { font-size: 12px; }
  .vendor-clients th { background: #f1f5f9; }
  .aging-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .aging-cell { text-align: center; padding: 14px 8px; border-radius: 8px; }
  .aging-cell .ac-label { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
  .aging-cell .ac-value { font-size: 20px; font-weight: 700; }
  .aging-cell .ac-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 10px; }
  .alert-warning { background: #fefce8; border: 1px solid #fde047; color: #713f12; }
  .alert-info { background: #eff6ff; border: 1px solid #93c5fd; color: #1e3a5f; }
  .alert-danger { background: #fef2f2; border: 1px solid #fca5a5; color: #7f1d1d; }
  .alert-success { background: #f0fdf4; border: 1px solid #86efac; color: #14532d; }
  .nota-detail { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 8px; font-size: 13px; }
  .nota-detail .row { display: flex; gap: 20px; margin-bottom: 8px; flex-wrap: wrap; }
  .nota-detail .field { display: flex; flex-direction: column; gap: 2px; }
  .nota-detail .field label { font-size: 10.5px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
  .flag-btn { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; white-space: nowrap; }
  .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all .2s; }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--primary-light); background: #eff6ff; }
  .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .drop-zone p { color: var(--text-muted); font-size: 14px; }
  .history { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }

  .history-item .dt { color: var(--text-muted); white-space: nowrap; }
  .history-item .tipo { font-weight: 600; color: var(--primary-light); white-space: nowrap; }
  .text-right { text-align: right; }
  .text-center { text-align: center; }
  .text-muted { color: var(--text-muted); }
  .text-danger { color: var(--danger); }
  .text-success { color: var(--success); }
  .gap-8 { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .mb-16 { margin-bottom: 16px; }
  .mt-12 { margin-top: 12px; }
  .hidden { display: none !important; }
  .chip { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  hr.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .search-bar input, .search-bar select { border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; font-size: 13px; outline: none; background: #fff; }
  .search-bar input:focus, .search-bar select:focus { border-color: var(--primary-light); }
  .search-bar input.main { flex: 1; min-width: 180px; }
  @media (max-width: 900px) { .aging-grid { grid-template-columns: repeat(3, 1fr); } }
</style>
</head>

const STATUS_LABELS = {
  a_vencer: 'A Vencer', cobranca_simples: 'Cobrança Simples', cobranca_avancada: 'Cobrança Avançada',
  aguardando_cartorio: 'Aguardando Cartório', enviado_cartorio: 'Enviado p/ Cartório',
  protestado: 'Protestado', emp_cobranca: 'Emp. Cobrança', enviar_juridico: 'Enviar p/ Jurídico',
  juridico: 'Jurídico', pago: 'Pago', aguardar: 'Aguardar', perdido: 'Perdido'
};

function diasAtraso(venc) {
  if (!venc) return 0;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const v = new Date(venc + 'T00:00:00'); v.setHours(0,0,0,0);
  return Math.floor((hoje - v) / 86400000);
}

function daysSince(dt) {
  if (!dt) return 0;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const d = new Date(dt + 'T00:00:00'); d.setHours(0,0,0,0);
  return Math.floor((hoje - d) / 86400000);
}

function calcStatus(nota) {
  if (nota.baseStatus === 'pago') return 'pago';
  if (nota.baseStatus === 'perdido') return 'perdido';
  if (nota.baseStatus === 'aguardar') return 'aguardar';
  if (nota.dataJuridico) return 'juridico';
  const dj = Number(DB.config.diasJuridico || 15);
  const dp = Number(DB.config.diasProtestado || 16);
  if (nota.dataEmpCob) {
    return daysSince(nota.dataEmpCob) >= dj ? 'enviar_juridico' : 'emp_cobranca';
  }
  if (nota.dataCartorio) {
    return daysSince(nota.dataCartorio) >= dp ? 'protestado' : 'enviado_cartorio';
  }
  const d = diasAtraso(nota.vencimento);
  const ds = Number(DB.config.diasFimSimples || 3);
  const da = Number(DB.config.diasFimAvancada || 6);
  if (d <= 0) return 'a_vencer';
  if (d <= ds) return 'cobranca_simples';
  if (d <= da) return 'cobranca_avancada';
  return 'aguardando_cartorio';
}

function statusBadge(s) {
  return `<span class="badge badge-${s}">${STATUS_LABELS[s] || s}</span>`;
}

  if (!token) return false;
  const resp = await fetch('https://graph.microsoft.com/v1.0/me/sendMail', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: {
        subject,
        body: { contentType: 'HTML', content: htmlBody },
        toRecipients: [{ emailAddress: { address: to } }]
      },
      saveToSentItems: true
    })
  });
  return resp.ok;
}

const GRAPH_SCOPES = ['User.Read', 'Files.ReadWrite.All', 'Sites.Read.All', 'Mail.Send', 'offline_access'];

async function getAuthToken(scopes) {
  const app = getMsalApp(); if (!app) return null;
  const accounts = app.getAllAccounts();
  if (!accounts.length) return null;
  try {
    const r = await app.acquireTokenSilent({ scopes, account: accounts[0] });
    return r.accessToken;
  } catch {
    try { await app.acquireTokenRedirect({ scopes }); return null; }
    catch { return null; }
  }
}

async function resolveSpSiteId() {
  if (_spSiteId) return _spSiteId;
  const url = (DB.config.sharePointUrl||'').trim();
  if (!url) return null;
  const token = await getAuthToken(GRAPH_SCOPES);
  if (!token) return null;
  try {
    const resp = await fetch(`https://graph.microsoft.com/v1.0/sites/${url}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    _spSiteId = data.id;
    return _spSiteId;
  } catch { return null; }
}

async function loadDBFromCloud() {
  const siteId = await resolveSpSiteId();
  if (!siteId) return false;
  const token = await getAuthToken(GRAPH_SCOPES);
  if (!token) return false;
  const path = DB.config.onedrivePath || 'reconlog_cobranca_db.json';
  try {
    const resp = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/${path}:/content`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!resp.ok) return false;
    const cloudData = await resp.json();
    // Merge: aplica dados do cloud mas preserva config local (Client ID, etc.)
    const localCfg = { ...DB.config };
    DB = { ...defaultDB(), ...cloudData };
    DB.config = { ...DB.config, ...localCfg }; // config local tem prioridade
    // Migrations
    if (!DB.faturamentoEmp) DB.faturamentoEmp = {};
    // Seed faturamento no sync do SharePoint também
    const _seed2 = _seedFaturamento();
    ['Reconlog','Reconlog Rental'].forEach(emp => {
      if (!DB.faturamentoEmp[emp]) DB.faturamentoEmp[emp] = {};
      Object.entries(_seed2[emp]).forEach(([ano, meses]) => {
        if (!DB.faturamentoEmp[emp][ano]) DB.faturamentoEmp[emp][ano] = meses;
      });
    });
    if (!DB.empresas) DB.empresas = ['Reconlog','Reconlog Rental','RL Estruturas','RL Montagens','RL Brasil'];
    // Seed vendedores no sync do SharePoint também
    if (!DB.vendedores) DB.vendedores = [];
    _seedVendedores().forEach(sv => {
      if (!DB.vendedores.find(v => v.nome === sv.nome)) {
        DB.vendedores.push({ id: uid(), ...sv });
      }
    });
    if (!DB.crm) DB.crm = [];
    localStorage.setItem(DB_KEY, JSON.stringify(DB));
    return true;
  } catch(e) { console.error('loadDBFromCloud error:', e); return false; }
}

async function saveDBToCloud() {
  const siteId = await resolveSpSiteId();
  if (!siteId) return false;
  const token = await getAuthToken(GRAPH_SCOPES);
  if (!token) return false;
  const path = DB.config.onedrivePath || 'reconlog_cobranca_db.json';
  try {
    const resp = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/${path}:/content`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(DB)
    });
    return resp.ok;
  } catch(e) { console.error('saveDBToCloud error:', e); return false; }
}

async function initUserSession(account) {
  const email = (account.username||'').toLowerCase();
  const loginMsg = document.getElementById('login-msg');

  // Carrega DB do cloud primeiro para ter a lista atualizada
  if (loginMsg) loginMsg.textContent = '⏳ Carregando dados...';
  const loaded = await loadDBFromCloud();
  if (!loaded && loginMsg) loginMsg.textContent = '⚠️ Não foi possível carregar do SharePoint — usando dados locais.';

  const admins  = (DB.config.usuariosAdmin||[]).map(e=>(e||'').toLowerCase().trim());
  const gestores = (DB.config.usuariosGestores||[]).map(e=>(e||'').toLowerCase().trim());
  const consulta = (DB.config.usuariosConsulta||[]).map(e=>(e||'').toLowerCase().trim());
  const todasListas = admins.length > 0 || gestores.length > 0 || consulta.length > 0;

  // Super Admin permanente — sempre acesso total independente das listas
  if (isSuperAdmin(email)) {
    _currentUser = { email, name: account.name || account.username, role: 'admin' };
  } else if (!todasListas) {
    _currentUser = { email, name: account.name || account.username, role: 'admin' };
  } else if (admins.includes(email)) {
    _currentUser = { email, name: account.name || account.username, role: 'admin' };
  } else if (admins.length === 0 && gestores.includes(email)) {
    _currentUser = { email, name: account.name || account.username, role: 'admin' };
  } else if (gestores.includes(email)) {
    _currentUser = { email, name: account.name || account.username, role: 'gestor' };
  } else if (consulta.includes(email)) {
    _currentUser = { email, name: account.name || account.username, role: 'consulta' };
  } else {
    // Usuário não autorizado
    if (loginMsg) loginMsg.textContent = '❌ Acesso não autorizado. Entre em contato com o administrador.';
    const btn = document.getElementById('btn-login-ms');
    if (btn) btn.disabled = false;
    return;

  // Esconde login, mostra app
  document.getElementById('login-screen').style.display = 'none';
  atualizarNavPorPerfil();
  updateTopbar();
  navigate('dashboard');
}

      return;
    }
  } catch(e) {
    console.error('handleRedirectPromise error:', e);
  }

  // Tenta login silencioso (sessão anterior)
  const accounts = app.getAllAccounts();

    return `<tr style="background:${i%2===0?'#ffffff':'#f8fafc'}">

        <span style="background:${cor}20;color:${cor};font-weight:700;padding:2px 8px;border-radius:12px;font-size:12px">${d}d</span>

async function enviarRelatorioVendedor(vendNome) {
  const vend = DB.vendedores.find(v=>v.nome===vendNome);
  if (!vend?.email) { alert(`Vendedor "${vendNome}" sem e-mail cadastrado.`); return false; }
  const notas = DB.notas.filter(n => {
    if(n.vendedor!==vendNome) return false;
    const s=calcStatus(n);
    return !['pago','perdido','a_vencer'].includes(s);
  }).sort((a,b)=>diasAtraso(b.vencimento)-diasAtraso(a.vencimento));
  if(!notas.length) return true; // nada a reportar, considera ok

  const tmpl = DB.templates.vendedor || {};
  const subj = (tmpl.emailSubj||'Relatório Diário – {{data}}').replace('{{data}}',new Date().toLocaleDateString('pt-BR')).replace('{{vendedor}}',vendNome);
  const htmlBody = gerarHTMLVendedor(vendNome, notas);

  const token = await getToken();
  if (token) {
    const ok = await sendViaGraph(vend.email, subj, htmlBody);
    if (ok) { addHistBulk(notas,'Relatório Vendedor',`Incluído no relatório diário enviado a ${vendNome}`); return true; }
    alert(`❌ Falha ao enviar para ${vend.email}`); return false;
  } else {
    // fallback mailto
    const plain = `Prezado(a) ${vendNome},\n\nSegue posição da sua carteira em ${new Date().toLocaleDateString('pt-BR')}:\n\n` +
      notas.map(n=>`NF ${n.nf} | ${n.cliente} | Venc: ${fmtDate(n.vencimento)} | ${diasAtraso(n.vencimento)} dias | ${fmt(n.valor)} | ${STATUS_LABELS[calcStatus(n)]}`).join('\n') +
      `\n\nAtenciosamente,\n${DB.config.empresaNome||'Reconlog'}`;
    window.open(`mailto:${vend.email}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(plain)}`);
    addHistBulk(notas,'Relatório Vendedor',`Incluído no relatório diário (mailto) enviado a ${vendNome}`);
    return true;
  }
}

async function enviarEmailTodosVendedores() {
  if (!DB.config.envioEmailAtivo) {
    alert('⚠️ Envio de e-mail está desativado.\nAcesse Parâmetros → Controles de Envio para habilitar.');
    return;
  }
  const vendedoresComNotas = [...new Set(DB.notas
    .filter(n=>!['pago','perdido','a_vencer'].includes(calcStatus(n)))
    .map(n=>n.vendedor).filter(Boolean))];
  if(!vendedoresComNotas.length){ alert('Nenhuma nota em atraso no momento.'); return; }

  const token = await getToken();
  const metodo = token ? 'Outlook (Graph API)' : 'mailto';
  if(!confirm(`Enviar relatório por e-mail para ${vendedoresComNotas.length} vendedor(es) via ${metodo}?`)) return;

  let ok=0, err=0;
  for(const v of vendedoresComNotas){ const res = await enviarRelatorioVendedor(v); res ? ok++ : err++; }
  DB.config.ultimoEnvioEmailVend = today(); DB.config.ultimoEnvioDiario = today();
  saveDB(); renderDashboard();
  alert(`✅ E-mails aos vendedores!\n• ${ok} com sucesso / ${err} com erro`);
}
// Alias para compatibilidade com código existente
async function enviarRelatoriosTodosVendedores() { return enviarEmailTodosVendedores(); }

async function enviarWATodosVendedores() {
  if (!DB.config.envioWhatsAtivo) {
    alert('⚠️ Envio de WhatsApp está desativado.\nAcesse Parâmetros → Controles de Envio para habilitar.');
    return;
  }
  const vendedoresComNotas = [...new Set(DB.notas
    .filter(n=>!['pago','perdido','a_vencer'].includes(calcStatus(n)))
    .map(n=>n.vendedor).filter(Boolean))];
  if(!vendedoresComNotas.length){ alert('Nenhuma nota em atraso no momento.'); return; }

  const temEvo = DB.config.evoUrl && DB.config.evoInstance && DB.config.evoToken;
  const metodoWA = temEvo ? 'Evolution API' : 'WhatsApp Web';
  if(!confirm(`Enviar relatório via WhatsApp para ${vendedoresComNotas.length} vendedor(es) via ${metodoWA}?`)) return;

  let ok=0, err=0, semWA=0;
  const empresa = DB.config.empresaNome || 'Reconlog';
  for(const vNome of vendedoresComNotas){
    const vend = DB.vendedores.find(v=>v.nome===vNome);
    if(!vend?.whats){ semWA++; continue; }
    const notas = DB.notas.filter(n=>n.vendedor===vNome && !['pago','perdido','a_vencer'].includes(calcStatus(n)));
    const total = notas.reduce((s,n)=>s+Number(n.valor||0),0);
    const msg = `📊 *Relatório de Carteira — ${empresa}*\n\nOlá, *${vNome}*! Sua posição hoje:\n\n`
      + notas.map(n=>`• ${n.cliente} | NF ${n.nf} | ${diasAtraso(n.vencimento)}d | ${fmt(n.valor)}`).join('\n')
      + `\n\n💰 *Total em aberto: ${fmt(total)}*\n\n_${empresa}_`;
    const phone = vend.whats.replace(/\D/g,'');
    if(temEvo){
      try{
        const r = await fetch(`${DB.config.evoUrl}/message/sendText/${DB.config.evoInstance}`,{
          method:'POST', headers:{'Content-Type':'application/json','apikey':DB.config.evoToken},
          body:JSON.stringify({number:phone, text:msg})
        });
        if(r.ok) ok++; else err++;
      }catch(e){ err++; }
    } else {
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
      ok++;
    }
  }
  DB.config.ultimoEnvioWAVend = today();
  saveDB(); renderDashboard();
  alert(`✅ WhatsApp aos vendedores!\n• ${ok} enviado(s) / ${err} erro(s)${semWA?`\n• ${semWA} sem número`:''}` );
}

function _clientesInadimplentes() {
  return [...new Set(DB.notas
    .filter(n=>!['pago','perdido','a_vencer'].includes(calcStatus(n)))
    .map(n=>n.cliente).filter(Boolean))];
}
function _buildWAMsgCliente(cliNome, notas) {
  const empresa = DB.config.empresaNome || 'Reconlog';
  const total = notas.reduce((s,n)=>s+Number(n.valor||0),0);
  const avisoWA = notas.length >= 2
    ? `\n\n⚠️ *Aviso:* Com ${notas.length} parcelas em atraso, os títulos poderão ser encaminhados para protesto em cartório e, dependendo do prazo, medidas legais poderão ser adotadas.`
    : '';
  return `Olá, *${cliNome}*! 👋\n\nA *${empresa}* identificou *${notas.length} título(s) em aberto* em seu cadastro:\n\n`
    + notas.map(n=>`📄 NF ${n.nf}\n   Vencto: ${fmtDate(n.vencimento)}\n   Atraso: *${diasAtraso(n.vencimento)} dias*\n   Valor: *${fmt(n.valor)}*`).join('\n\n')
    + `\n\n💰 *Total em aberto: ${fmt(total)}*${avisoWA}\n\nSolicitamos a regularização o mais breve possível. Entre em contato com nossa equipe financeira para negociação.\n\nAtenciosamente,\n*${empresa}*`;
}

async function enviarEmailTodosClientes() {
  if (!DB.config.envioEmailAtivo) {
    alert('⚠️ Envio de e-mail está desativado.\nAcesse Parâmetros → Controles de Envio para habilitar.');
    return;
  }
  const todos = _clientesInadimplentes();
  if(!todos.length){ alert('Nenhuma nota em atraso no momento.'); return; }
  const comEmail = todos.filter(c=>getEmailsCliente(DB.clientes.find(x=>x.nome===c)).length > 0);
  const semEmail = todos.length - comEmail.length;
  if(!comEmail.length){ alert('Nenhum cliente inadimplente tem e-mail cadastrado.'); return; }

  const token = await getToken();
  const metodo = token ? 'Outlook (Graph API)' : 'mailto';
  const aviso = semEmail ? `\n⚠️ ${semEmail} cliente(s) sem e-mail serão ignorados.` : '';
  if(!confirm(`Enviar relatório por e-mail para ${comEmail.length} cliente(s) via ${metodo}?${aviso}`)) return;

  let ok=0, err=0;
  const tmpl = DB.templates.relatorio_cliente || {};
  const empresa = DB.config.empresaNome || 'Reconlog';
  const subj = (tmpl.emailSubj||'Relatório de Inadimplência – {{empresa}}').replace('{{empresa}}',empresa);

  for(const cliNome of comEmail){
    const cli = DB.clientes.find(c=>c.nome===cliNome);
    const notas = DB.notas.filter(n=>n.cliente===cliNome && !['pago','perdido','a_vencer'].includes(calcStatus(n)))
      .sort((a,b)=>diasAtraso(b.vencimento)-diasAtraso(a.vencimento));
    if(!notas.length) continue;
    const emailsDest = getEmailsCliente(cli);
    const total = notas.reduce((s,n)=>s+Number(n.valor||0),0);
    const htmlBody = gerarHTMLCliente(cliNome, notas);
    if(token){
      let enviadoOk=false;
      for(const dest of emailsDest){
        const res = await sendViaGraph(dest, subj, htmlBody);
        if(res) enviadoOk=true; else err++;
      }
      if(enviadoOk){ addHistBulk(notas,'Relatório Cliente',`E-mail via Outlook para ${emailsDest.join(', ')}`); ok++; }
    } else {
      const plain = `Prezado(a) ${cliNome},\n\nSeguem seus títulos em aberto:\n\n`
        + notas.map(n=>`NF ${n.nf} | Venc: ${fmtDate(n.vencimento)} | ${diasAtraso(n.vencimento)} dias | ${fmt(n.valor)}`).join('\n')
        + `\n\nTotal: ${fmt(total)}\n\nAtenciosamente,\n${empresa}`;
      window.open(`mailto:${emailsDest.join(',')}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(plain)}`);
      addHistBulk(notas,'Relatório Cliente',`E-mail via mailto para ${emailsDest.join(', ')}`); ok++;
    }
  }
  DB.config.ultimoEnvioEmailCli = today(); DB.config.ultimoEnvioClientes = today();
  saveDB(); renderDashboard();
  alert(`✅ E-mails aos clientes!\n• ${ok} enviado(s) / ${err} erro(s)`);
}

async function enviarRelatorioCliente(cliNome) {
  const cli = DB.clientes.find(c=>c.nome===cliNome);
  const emailsDestino = getEmailsCliente(cli);
  if(!emailsDestino.length){ alert(`Cliente "${cliNome}" sem e-mail cadastrado.`); return; }
  const notas = DB.notas.filter(n=>{
    if(n.cliente!==cliNome) return false;
    const s=calcStatus(n);
    return !['pago','perdido','a_vencer'].includes(s);
  }).sort((a,b)=>diasAtraso(b.vencimento)-diasAtraso(a.vencimento));
  if(!notas.length){ alert(`Nenhuma nota em aberto para "${cliNome}".`); return; }

  const tmpl = DB.templates.relatorio_cliente || {};
  const subj = (tmpl.emailSubj||'Relatório de Inadimplência – {{empresa}}').replace('{{empresa}}',DB.config.empresaNome||'Reconlog');
  const emailsStr = emailsDestino.join(', ');
  const emailsParam = emailsDestino.join(',');

  openModal(`
    <h2>📊 Relatório de Inadimplência — ${cliNome}</h2>
    <div class="alert alert-info">Para: <b>${emailsStr}</b> &nbsp;|&nbsp; <b>${notas.length}</b> título(s) em aberto</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Assunto</label>
      <input id="cr-subj" value="${subj.replace(/"/g,'&quot;')}">
    </div>
    <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px">
      ${gerarHTMLCliente(cliNome, notas)}
    </div>
    <div class="alert alert-warning">O e-mail acima será enviado com a tabela de notas em aberto. O texto de introdução pode ser editado em <b>Templates → Relatório Cliente</b>.</div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="dispararRelatorioCliente('${cliNome}','${emailsParam}')">📤 Enviar para ${emailsStr}</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

async function dispararRelatorioCliente(cliNome, emailsParam) {
  const emails = (emailsParam||'').split(',').map(e=>e.trim()).filter(Boolean);
  const notas = DB.notas.filter(n=>n.cliente===cliNome&&!['pago','perdido','a_vencer'].includes(calcStatus(n)));
  const subj = document.getElementById('cr-subj')?.value || '';
  const htmlBody = gerarHTMLCliente(cliNome, notas);

  const token = await getToken();
  if(token){
    let ok = false;
    for (const email of emails) {
      const res = await sendViaGraph(email, subj, htmlBody);
      if(res) ok = true;
    }
    if(ok){
      addHistBulk(notas,'Relatório Cliente',`Relatório de inadimplência enviado para ${emails.join(', ')}`);
      saveDB(); closeModal();
      alert('✅ Relatório enviado com sucesso!');
    } else { alert('❌ Falha no envio via Outlook.'); }
  } else {
    const plain = `Prezado(a) ${cliNome},\n\nSeguem seus títulos em aberto:\n\n` +
      notas.map(n=>`NF ${n.nf} | Venc: ${fmtDate(n.vencimento)} | ${diasAtraso(n.vencimento)} dias | ${fmt(n.valor)} | ${STATUS_LABELS[calcStatus(n)]}`).join('\n') +
      `\n\nTotal em aberto: ${fmt(notas.reduce((s,n)=>s+Number(n.valor||0),0))}\n\nAtenciosamente,\n${DB.config.empresaNome||'Reconlog'}`;
    window.open(`mailto:${emails.join(',')}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(plain)}`);
    addHistBulk(notas,'Relatório Cliente',`Relatório enviado via mailto para ${emails.join(', ')}`);
    saveDB(); closeModal();
  }
}

function addHistBulk(notas, tipo, desc) {
  notas.forEach(n=>addHist(n,tipo,desc));
}

function toggleEnvio(tipo, on) {
  if (tipo === 'email') DB.config.envioEmailAtivo = on;
  else DB.config.envioWhatsAtivo = on;
  saveDB();
  renderParametros();
}

function toggleAutoSend(tipo, on) {
  if (tipo === 'simples') DB.config.autoSendSimples = on;
  else DB.config.autoSendAvancada = on;
  saveDB();
  if (on) runAutoSend(tipo);
}

function runAutoSend(tipo) {
  const statusAlvo = tipo === 'simples' ? 'cobranca_simples' : 'cobranca_avancada';
  const elegíveis = DB.notas.filter(n => calcStatus(n) === statusAlvo);
  if (elegíveis.length === 0) { alert(`Nenhuma nota em ${STATUS_LABELS[statusAlvo]} no momento.`); return; }
  let enviados = 0, semEmail = 0, semWA = 0;
  elegíveis.forEach(n => {
    const cli = getCliente(n.cliente);
    if (cli?.email) { sendEmailSilent(n); enviados++; }
    else semEmail++;
    if (cli?.whats) sendWhatsAppSilent(n);
    else semWA++;
  });
  saveDB();
  let msg = `✅ Auto-envio concluído para ${STATUS_LABELS[statusAlvo]}:\n• ${enviados} e-mails enviados`;
  if (semEmail > 0) msg += `\n• ${semEmail} cliente(s) sem e-mail cadastrado`;
  if (semWA > 0) msg += `\n• ${semWA} cliente(s) sem WhatsApp cadastrado`;
  alert(msg);
}

function sendEmailSilent(nota) {
  if (!DB.config.envioEmailAtivo) return; // Envio de e-mail desativado
  const s = calcStatus(nota);
  const tmpl = DB.templates[s === 'cobranca_simples' ? 'cobranca_simples' : 'cobranca_avancada'] || {};
  const cli = getCliente(nota.cliente);
  const emailsCli = getEmailsCliente(cli);
  if (!emailsCli.length) return;
  const subj = fillTmpl(tmpl.emailSubj||'', nota);
  const corpo = fillTmpl(tmpl.emailBody||'', nota);
  window.open(`mailto:${emailsCli.join(',')}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(corpo)}`);
  addHist(nota, 'E-mail Auto', `Relatório enviado automaticamente para ${emailsCli.join(', ')}`);
}

function sendWhatsAppSilent(nota) {
  if (!DB.config.envioWhatsAtivo) return;
  const s = calcStatus(nota);
  const tmpl = DB.templates[s === 'cobranca_simples' ? 'cobranca_simples' : 'cobranca_avancada'] || {};
  const cli = getCliente(nota.cliente);
  const phones = getWhatsCliente(cli);
  if (!phones.length) return;
  const msg = fillTmpl(tmpl.whatsApp, nota);
  const cfg = DB.config;
  for(const phone of phones){
    const num = phone.replace(/\D/g,'');
    if (cfg.evoUrl && cfg.evoInstance && cfg.evoToken) {
      fetch(`${cfg.evoUrl}/message/sendText/${cfg.evoInstance}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': cfg.evoToken },
        body: JSON.stringify({ number: num, text: msg })
      }).then(r => { if (r.ok) addHist(nota, 'WhatsApp Auto', `Auto-envio Evolution API para ${phone}`); });
    } else {
      window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`);
      addHist(nota, 'WhatsApp Auto', `Auto-envio WhatsApp Web para ${phone}`);
    }
  }
}

function renderDashboard() {
  const notas = _empresaFiltro
    ? DB.notas.filter(n => n.empresa === _empresaFiltro)
    : DB.notas;
  let totalEmitido=0, totalVencido=0, totalPago=0;
  const aging = {'1-15':0,'16-30':0,'31-60':0,'61-90':0,'91-120':0,'120+':0};
  const agingVal = {'1-15':0,'16-30':0,'31-60':0,'61-90':0,'91-120':0,'120+':0};
  let flagCart=0, flagEmp=0, flagJur=0, flagProt=0, flagCobAv=0, flagEnvCart=0;
  let valCart=0, valCobAv=0, valAguardCart=0, valEmp=0, valJur=0;

  notas.forEach(n => {
    const v = Number(n.valor||0);
    totalEmitido += v;
    const s = calcStatus(n);
    if (s === 'pago') { totalPago += v; return; }
    if (s === 'cobranca_avancada') { flagCobAv++; valCobAv += Number(n.valor||0); }
    if (s === 'aguardando_cartorio') { flagCart++; valAguardCart += Number(n.valor||0); }
    if (s === 'enviado_cartorio') { flagEnvCart++; valCart += Number(n.valor||0); }
    if (s === 'protestado') { flagProt++; valCart += Number(n.valor||0); }
    if (s === 'emp_cobranca' || s === 'enviar_juridico') { flagEmp += (s==='enviar_juridico'?1:0); valEmp += Number(n.valor||0); }
    if (s === 'juridico') { flagJur++; valJur += Number(n.valor||0); }
    const d = diasAtraso(n.vencimento);
    if (d > 0) {
      totalVencido += v;
      if (d<=15) {aging['1-15']++;agingVal['1-15']+=v;}
      else if(d<=30){aging['16-30']++;agingVal['16-30']+=v;}
      else if(d<=60){aging['31-60']++;agingVal['31-60']+=v;}
      else if(d<=90){aging['61-90']++;agingVal['61-90']+=v;}
      else if(d<=120){aging['91-120']++;agingVal['91-120']+=v;}
      else{aging['120+']++;agingVal['120+']+=v;}
    }
  });

  const pctInad = totalEmitido > 0 ? ((totalVencido/totalEmitido)*100).toFixed(1) : '0.0';

  // Taxa real sobre faturamento cadastrado (por empresa se filtro ativo)
  // Usa apenas notas com vencimento no ano atual para consistência com o accordion mensal
  const anoAtual = new Date().getFullYear();
  const mesAtual = new Date().getMonth() + 1;
  const fatAcumulado = _empresaFiltro
    ? getFatAcumuladoEmp(anoAtual, mesAtual, _empresaFiltro)
    : getFatAcumuladoConsolidado(anoAtual, mesAtual);
  const vencidoAnoAtual = notas.filter(n => {
    const s = calcStatus(n);
    return (n.vencimento||'').startsWith(String(anoAtual))
      && !['pago','perdido'].includes(s)
      && diasAtraso(n.vencimento) > 0;
  }).reduce((s,n) => s + Number(n.valor||0), 0);
  const taxaReal = fatAcumulado > 0 ? ((vencidoAnoAtual / fatAcumulado) * 100).toFixed(2) : null;
  const fatAnoTotal = _empresaFiltro ? getFatAnoEmp(anoAtual, _empresaFiltro) : getFatConsolidado(anoAtual);

  // Curva ABC clientes
  const cliMap = {};
  notas.forEach(n => {
    const s = calcStatus(n);
    if(['pago','perdido','a_vencer'].includes(s)) return;
    const d = diasAtraso(n.vencimento);
    if(d <= 0) return;
    const k = n.cliente || 'Sem Cliente';
    if(!cliMap[k]) cliMap[k] = { nome: k, valor: 0, count: 0 };
    cliMap[k].valor += Number(n.valor||0);
    cliMap[k].count++;
  });
  const abcClientes = Object.values(cliMap).sort((a,b)=>b.valor-a.valor).slice(0,10);
  const abcTotal = abcClientes.reduce((s,c)=>s+c.valor,0);

  // Ranking
  const vendMap = {};
  notas.forEach(n => {
    const k = n.vendedor || 'Sem Vendedor';
    if (!vendMap[k]) vendMap[k] = { nome: k, notas: [] };
    vendMap[k].notas.push(n);
  });
  const ranking = Object.values(vendMap).map(v => {
    const vencido = v.notas.reduce((s,n)=>{
      if(['pago','perdido'].includes(calcStatus(n))) return s;
      return diasAtraso(n.vencimento)>0 ? s+Number(n.valor||0) : s;
    },0);
    return {...v, vencido};
  }).sort((a,b)=>b.vencido-a.vencido);

  const agingColors = ['#fef9c3','#ffedd5','#fed7aa','#fecaca','#f9a8d4','#ddd6fe'];
  const agingKeys = ['1-15','16-30','31-60','61-90','91-120','120+'];

  const alertas = [];
  // Banner de relatório diário
  if (!DB.config.envioEmailAtivo) {
    alertas.push(`<div class="alert" style="background:#fff1f2;border:1px solid #fda4af;color:#881337;justify-content:space-between">
      <span>🔒 <b>Envio de e-mail desativado.</b> Nenhum relatório ou cobrança será enviado por e-mail.</span>

    </div>`);
  }

function renderVencidos() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="flex-between mb-16">
        <div class="search-bar" style="flex:1;margin-bottom:0">
          <input class="main" id="v-q" placeholder="Buscar NF, cliente, vendedor..." oninput="filterVencidos()">

            ${Object.entries(STATUS_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
          </select>
          <select id="v-emp" onchange="filterVencidos()">
            <option value="">Todas as empresas</option>
            ${(DB.empresas||[]).map(e=>`<option>${e}</option>`).join('')}
          </select>
          <select id="v-vend" onchange="filterVencidos()">
            <option value="">Todos os vendedores</option>
            ${DB.vendedores.map(v=>`<option>${v.nome}</option>`).join('')}
          </select>
        </div>
        <div class="gap-8" style="margin-left:10px;flex-shrink:0">
          <button class="btn btn-primary btn-sm" onclick="openNotaForm()">➕ Novo Lançamento</button>
          <button class="btn btn-ghost btn-sm" onclick="exportVencidos()">📥 Exportar</button>
        </div>
      </div>
      <div id="v-bulk-bar" style="display:none;align-items:center;gap:12px;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 16px;margin-bottom:12px">
        <span id="v-bulk-count" style="font-size:13px;font-weight:600;color:var(--danger)"></span>
        <button class="btn btn-danger btn-sm" onclick="excluirSelecionados()">🗑️ Excluir Selecionados</button>
        <button class="btn btn-ghost btn-sm" onclick="limparSelecao()">✕ Cancelar</button>
      </div>
      <div class="tbl-wrap" id="vencidos-tbl"></div>
    </div>`;
  filterVencidos();
}

function filterVencidos() {
  const q = (document.getElementById('v-q')?.value||'').toLowerCase();
  const sf = document.getElementById('v-status')?.value||'';
  const vf = document.getElementById('v-vend')?.value||'';
  const ef = document.getElementById('v-emp')?.value||'';
  const notas = DB.notas.filter(n=>{
    const s=calcStatus(n);
    if(sf&&s!==sf) return false;
    if(vf&&n.vendedor!==vf) return false;
    if(ef&&n.empresa!==ef) return false;
    if(q&&!`${n.nf} ${n.cliente} ${n.vendedor} ${n.empresa||''}`.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>{
    const dir = _vSort.dir === 'asc' ? 1 : -1;
    switch(_vSort.campo) {
      case 'nf':       return dir * (a.nf||'').localeCompare(b.nf||'', 'pt-BR', {numeric:true});
      case 'cliente':  return dir * (a.cliente||'').localeCompare(b.cliente||'', 'pt-BR');
      case 'vencimento': return dir * (a.vencimento||'').localeCompare(b.vencimento||'');
      default:         return dir * (diasAtraso(b.vencimento) - diasAtraso(a.vencimento)) * -1;
    }
  });

  const rows = notas.map(n=>{
    const s=calcStatus(n), d=diasAtraso(n.vencimento);
    // Histórico CRM desta nota (para cor e tooltip)
    const crmNota = (DB.crm||[]).filter(c => c.notaId === n.id);
    const temCrm = crmNota.length > 0;
    const ultimaTrat = temCrm ? crmNota[crmNota.length-1].tratativa.substring(0,80) : '';
    const tooltipCrm = temCrm ? `${crmNota.length} tratativa(s). Última: ${ultimaTrat}${ultimaTrat.length===80?'…':''}` : 'Nenhuma tratativa ainda';
    return `<tr id="row-${n.id}">
      <td style="text-align:center;width:36px"><input type="checkbox" class="v-chk" data-id="${n.id}" onchange="atualizarBarraBulk()" style="width:15px;height:15px;cursor:pointer"></td>
      <td><b>${n.nf||'—'}</b></td>
      <td>${n.cliente||'—'}</td>
      <td>${fmtDate(n.vencimento)}</td>
      <td class="text-right ${d>0?'text-danger':'text-success'}">${d>0?d+'d':'Em dia'}</td>
      <td><span style="font-size:11px;background:var(--primary);color:#fff;padding:1px 6px;border-radius:10px;white-space:nowrap">${n.empresa||'—'}</span></td>
      <td>${n.vendedor||'—'}</td>
      <td class="text-right">${fmt(n.valor)}</td>
      <td>
        ${statusBadge(s)}
        ${n.emTrativaCom ? `<div style="margin-top:4px" id="trat-badge-${n.id}">${badgeTratativa(n.emTrativaCom)}</div>` : `<span id="trat-badge-${n.id}"></span>`}
      </td>
      <td title="${tooltipCrm}" style="min-width:220px;white-space:normal">
        <div style="display:flex;flex-direction:column;gap:4px">
          <input type="text" value="" placeholder="${temCrm?'+ Nova tratativa...':'Observação...'}" onblur="salvarObs('${n.id}',this.value)" onkeydown="if(event.key==='Enter'){salvarObs('${n.id}',this.value);this.value='';event.preventDefault();}" style="width:100%;border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;color:var(--text);background:${temCrm?'#fefce8':'#fff'}">
          <select onchange="salvarTrativaCom('${n.id}',this.value)" style="border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:11px;color:var(--text);background:#fff;cursor:pointer" title="Em tratativa com">
            <option value="" ${!n.emTrativaCom?'selected':''}>Em tratativa com…</option>
            ${TRATATIVAS_AREAS.map(a=>`<option value="${a.key}" ${n.emTrativaCom===a.key?'selected':''}>${a.icon} ${a.key}</option>`).join('')}
          </select>
        </div>
      </td>
      <td><div class="gap-8">${buildActionBtns(n,s)}<button class="btn btn-ghost btn-xs" title="Ver detalhes" onclick="openNotaModal('${n.id}')">📋</button><button class="btn btn-ghost btn-xs" title="Editar lançamento" onclick="openNotaForm('${n.id}')">✏️</button><button class="btn btn-ghost btn-xs" title="Excluir lançamento" onclick="excluirNota('${n.id}')" style="color:var(--danger)">🗑️</button></div></td>
    </tr>`;
  }).join('');

  document.getElementById('vencidos-tbl').innerHTML = `
    <table><thead><tr>
      <th style="text-align:center;width:36px"><input type="checkbox" id="v-chk-all" onchange="selecionarTodos(this.checked)" style="width:15px;height:15px;cursor:pointer" title="Selecionar todos"></th>
      ${(()=>{
        const cols=[{c:'nf',l:'NF'},{c:'cliente',l:'Cliente'},{c:'vencimento',l:'Vencimento'},{c:'atraso',l:'Atraso',r:true}];
        return cols.map(({c,l,r})=>{
          const ativo=_vSort.campo===c;
          const seta=ativo?(_vSort.dir==='asc'?' ▲':' ▼'):'';
          return `<th${r?' class="text-right"':''} onclick="setSortVencidos('${c}')" style="cursor:pointer;user-select:none;white-space:nowrap${ativo?';color:var(--primary);font-weight:800':''}" title="Clique para ordenar por ${l}">${l}${seta}</th>`;
        }).join('');
      })()}
      <th>Empresa</th><th>Vendedor</th><th class="text-right">Valor</th><th>Status</th>
      <th>Observação</th><th style="white-space:nowrap">📋 ✏️ 🗑️</th>
    </tr></thead><tbody>${rows||'<tr><td colspan="11" class="text-center text-muted" style="padding:20px">Nenhuma nota encontrada</td></tr>'}</tbody></table>
    <div class="text-muted" style="font-size:12px;padding:8px 0">${notas.length} nota(s)</div>`;
}

function selecionarTodos(checked) {
  document.querySelectorAll('.v-chk').forEach(cb => cb.checked = checked);
  atualizarBarraBulk();
}

function atualizarBarraBulk() {
  const selecionados = document.querySelectorAll('.v-chk:checked');
  const total = document.querySelectorAll('.v-chk').length;
  const bar = document.getElementById('v-bulk-bar');
  const count = document.getElementById('v-bulk-count');
  const chkAll = document.getElementById('v-chk-all');
  if (!bar) return;
  if (selecionados.length > 0) {
    bar.style.display = 'flex';
    count.textContent = `${selecionados.length} lançamento(s) selecionado(s)`;
    if (chkAll) chkAll.indeterminate = selecionados.length > 0 && selecionados.length < total;
    if (chkAll && selecionados.length === total) chkAll.checked = true;
  } else {
    bar.style.display = 'none';
    if (chkAll) { chkAll.checked = false; chkAll.indeterminate = false; }
  }
}

function limparSelecao() {
  document.querySelectorAll('.v-chk').forEach(cb => cb.checked = false);
  const chkAll = document.getElementById('v-chk-all');
  if (chkAll) { chkAll.checked = false; chkAll.indeterminate = false; }
  atualizarBarraBulk();
}

function excluirSelecionados() {
  const ids = [...document.querySelectorAll('.v-chk:checked')].map(cb => cb.dataset.id);
  if (!ids.length) return;
  if (!confirm(`⚠️ Confirmar exclusão de ${ids.length} lançamento(s) selecionado(s)?\n\nEsta ação não pode ser desfeita.`)) return;
  DB.notas = DB.notas.filter(n => !ids.includes(n.id));
  saveDB();
  filterVencidos();
}

function buildActionBtns(n, s) {
  const id = n.id, r = [];
  if (false) { // E-mail e WhatsApp por nota removidos — envio em massa pelo Dashboard
  }
  if (s==='aguardando_cartorio') r.push(`<button class="flag-btn" style="background:#fce7f3;color:#9d174d" onclick="flagCartorio('${id}')">⚖️ Enviar Cartório</button>`);
  if (s==='protestado') r.push(`<button class="flag-btn" style="background:#fdf4ff;color:#7e22ce" onclick="flagEmpCob('${id}')">🏢 Emp. Cobrança</button>`);
  if (s==='enviar_juridico') r.push(`<button class="flag-btn" style="background:#fee2e2;color:#7f1d1d" onclick="flagJuridico('${id}')">⚖️ Enviar Jurídico</button>`);
  if (!['pago','perdido'].includes(s)) {
    r.push(`<button class="flag-btn" style="background:#dcfce7;color:#15803d" onclick="setBase('${id}','pago')">✅ Pago</button>`);
    if (s==='aguardar') r.push(`<button class="flag-btn" style="background:#e0f2fe;color:#075985" onclick="clearAguardar('${id}')">▶️ Retomar</button>`);
    else r.push(`<button class="flag-btn" style="background:#e0f2fe;color:#075985" onclick="setBase('${id}','aguardar')">⏸️ Aguardar</button>`);
    r.push(`<button class="flag-btn" style="background:#f1f5f9;color:#475569" onclick="setBase('${id}','perdido')">🚫 Perdido</button>`);
  }
  return r.join('');
}

function onEtapaChange() {
  const v = document.getElementById('nf-etapa')?.value;
  const show = (id, visible) => {
    const el = document.getElementById(id);
    if(el) el.style.display = visible ? '' : 'none';
  };
  show('nf-dt-cartorio-wrap', v === 'cartorio');
  show('nf-dt-empcob-wrap',   v === 'empcob');
  show('nf-dt-juridico-wrap', v === 'juridico');
  show('nf-dt-pago-wrap',     v === 'pago');
}

function saveNota(id) {
  const nf    = document.getElementById('nf-nf').value.trim();
  const emp   = document.getElementById('nf-emp')?.value || '';
  const cli   = document.getElementById('nf-cli').value;
  const vend  = document.getElementById('nf-vend').value;
  const emis  = document.getElementById('nf-emis').value;
  const venc  = document.getElementById('nf-venc').value;
  const valor = parseFloat(document.getElementById('nf-valor').value) || 0;
  const etapa       = document.getElementById('nf-etapa')?.value || 'auto';
  const emTrativaCom = document.getElementById('nf-tratativa')?.value || '';

  // Derivar baseStatus e datas a partir da etapa selecionada
  let base         = null;
  let dataCartorio = null;
  let dataEmpCob   = null;
  let dataJuridico = null;
  let dataPagamento= null;

  if (etapa === 'pago')     { base = 'pago';     dataPagamento = document.getElementById('nf-dt-pago')?.value || today(); }
  if (etapa === 'aguardar') { base = 'aguardar'; }
  if (etapa === 'perdido')  { base = 'perdido';  }
  if (etapa === 'cartorio') { dataCartorio = document.getElementById('nf-dt-cartorio')?.value || today(); }
  if (etapa === 'empcob')   { dataCartorio = document.getElementById('nf-dt-cartorio')?.value || null;
                               dataEmpCob   = document.getElementById('nf-dt-empcob')?.value   || today(); }
  if (etapa === 'juridico') { dataCartorio = document.getElementById('nf-dt-cartorio')?.value || null;
                               dataEmpCob   = document.getElementById('nf-dt-empcob')?.value   || null;
                               dataJuridico = document.getElementById('nf-dt-juridico')?.value || today(); }

  if (!nf)   { alert('Número da NF é obrigatório'); return; }
  if (!cli)  { alert('Selecione o cliente'); return; }
  if (!venc) { alert('Data de vencimento é obrigatória'); return; }

  if (id) {
    const n = DB.notas.find(x => x.id === id);
    if (!n) return;
    const changed = [];
    if (n.nf !== nf) changed.push(`NF: ${n.nf} → ${nf}`);
    if (n.vencimento !== venc) changed.push(`Venc: ${fmtDate(n.vencimento)} → ${fmtDate(venc)}`);
    if (Number(n.valor) !== valor) changed.push(`Valor: ${fmt(n.valor)} → ${fmt(valor)}`);
    if (etapa !== 'auto') changed.push(`Etapa ajustada manualmente: ${etapa}`);
    if ((n.emTrativaCom||'') !== emTrativaCom) changed.push(`Em tratativa com: ${n.emTrativaCom||'—'} → ${emTrativaCom||'—'}`);
    Object.assign(n, {
      nf, cliente: cli, vendedor: vend, empresa: emp, emissao: emis, vencimento: venc, valor,
      baseStatus: base||null,
      dataCartorio: etapa==='auto' ? n.dataCartorio : dataCartorio,
      dataEmpCob:   etapa==='auto' ? n.dataEmpCob   : dataEmpCob,
      dataJuridico: etapa==='auto' ? n.dataJuridico  : dataJuridico,
      dataPagamento: etapa==='pago' ? dataPagamento : n.dataPagamento,
      emTrativaCom
    });
    if (changed.length) addHist(n, 'Edição', changed.join('; '));
  } else {
    // Verifica duplicata
    if (DB.notas.find(n => n.nf === nf && n.cliente === cli)) {
      if (!confirm(`⚠️ Já existe uma nota ${nf} para o cliente "${cli}". Deseja adicionar mesmo assim?`)) return;
    }
    const nova = {
      id: uid(), nf, cliente: cli, vendedor: vend, empresa: emp, emissao: emis, vencimento: venc,
      valor, baseStatus: null, dataCartorio: null, dataEmpCob: null, dataJuridico: null,
      emTrativaCom,
      historico: [{ data: new Date().toISOString(), tipo: 'Lançamento Manual', desc: `Criado manualmente por operador` }]
    };
    DB.notas.push(nova);
  }
  saveDB();
  closeModal();
  if (currentPage === 'vencidos') filterVencidos();
  else renderDashboard();
}

function abrirMapaTratativas(areaKey) {
  const notasVencidasAtivas = DB.notas.filter(n => {
    const s = calcStatus(n);
    return !['pago','perdido'].includes(s) && diasAtraso(n.vencimento) > 0;
  });
  const grupo = notasVencidasAtivas.filter(n => (n.emTrativaCom||'__sem__') === areaKey);
  const area  = areaKey === '__sem__'
    ? { key:'Sem definição', color:'#9ca3af', bg:'#f3f4f6', text:'#374151', icon:'❓' }
    : getTratativaArea(areaKey);
  const totalVal = grupo.reduce((s,n)=>s+Number(n.valor||0),0);
  const totalGeral = notasVencidasAtivas.reduce((s,n)=>s+Number(n.valor||0),0);
  const pct = totalGeral > 0 ? ((totalVal/totalGeral)*100).toFixed(1) : '0.0';

  const rows = [...grupo].sort((a,b)=>diasAtraso(b.vencimento)-diasAtraso(a.vencimento)).map(n => {
    const d = diasAtraso(n.vencimento);
    const s = calcStatus(n);
    return `<tr>
      <td><b>${n.cliente}</b></td>
      <td style="color:var(--text-muted);font-size:12px">${n.nf}</td>
      <td>${fmtDate(n.vencimento)}</td>
      <td style="color:${d>30?'var(--danger)':'#d97706'};font-weight:700;text-align:right">${d}d</td>
      <td class="text-right"><b>${fmt(n.valor)}</b></td>
      <td>${statusBadge(s)}</td>
    </tr>`;
  }).join('');

  openModal(`

function gerarRelatorioIndicadores() {
  const notas = DB.notas;
  const empresa = DB.config.empresaNome || 'Reconlog';
  const data = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

  // Calcular todos os indicadores
  const ativos = notas.filter(n => !['pago','perdido'].includes(calcStatus(n)) && diasAtraso(n.vencimento) > 0);
  const pagos  = notas.filter(n => calcStatus(n) === 'pago');
  const totalVencido   = ativos.reduce((s,n)=>s+Number(n.valor||0),0);
  const totalPago      = pagos.reduce((s,n)=>s+Number(n.valor||0),0);
  const valCobAv       = ativos.filter(n=>calcStatus(n)==='cobranca_avancada').reduce((s,n)=>s+Number(n.valor||0),0);
  const cntCobAv       = ativos.filter(n=>calcStatus(n)==='cobranca_avancada').length;
  const valAguardCart  = ativos.filter(n=>calcStatus(n)==='aguardando_cartorio').reduce((s,n)=>s+Number(n.valor||0),0);
  const cntAguardCart  = ativos.filter(n=>calcStatus(n)==='aguardando_cartorio').length;
  const valProt        = ativos.filter(n=>['enviado_cartorio','protestado'].includes(calcStatus(n))).reduce((s,n)=>s+Number(n.valor||0),0);
  const cntProt        = ativos.filter(n=>['enviado_cartorio','protestado'].includes(calcStatus(n))).length;
  const valEmp         = ativos.filter(n=>['emp_cobranca','enviar_juridico'].includes(calcStatus(n))).reduce((s,n)=>s+Number(n.valor||0),0);
  const cntEmp         = ativos.filter(n=>['emp_cobranca','enviar_juridico'].includes(calcStatus(n))).length;
  const valJur         = ativos.filter(n=>calcStatus(n)==='juridico').reduce((s,n)=>s+Number(n.valor||0),0);
  const cntJur         = ativos.filter(n=>calcStatus(n)==='juridico').length;

  const pct = (v) => totalVencido > 0 ? ((v/totalVencido)*100).toFixed(1)+'%' : '—';

  // Mapa de Tratativas
  const gruposTrat = {};
  ativos.forEach(n => {
    const key = n.emTrativaCom || 'Sem definição';
    if(!gruposTrat[key]) gruposTrat[key] = {val:0,cnt:0};
    gruposTrat[key].val += Number(n.valor||0);
    gruposTrat[key].cnt++;
  });
  const tratRows = Object.entries(gruposTrat).sort((a,b)=>b[1].val-a[1].val).map(([k,v])=>`
    <tr>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb">${k}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right;font-weight:700">${fmt(v.val)}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:center">${v.cnt}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right;color:#6b7280">${pct(v.val)}</td>
    </tr>`).join('');

  // Top 10 maiores devedores
  const porCliente = {};
  ativos.forEach(n => {
    if(!porCliente[n.cliente]) porCliente[n.cliente] = {val:0,cnt:0};
    porCliente[n.cliente].val += Number(n.valor||0);
    porCliente[n.cliente].cnt++;
  });
  const top10 = Object.entries(porCliente).sort((a,b)=>b[1].val-a[1].val).map(([k,v],i)=>`
    <tr>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-weight:600">#${i+1}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb">${k}</td>

    </tr>`).join('');

  // Por vendedor
  const porVendedor = {};
  ativos.forEach(n => {
    const v = n.vendedor || 'Sem vendedor';
    if(!porVendedor[v]) porVendedor[v] = {val:0,cnt:0};
    porVendedor[v].val += Number(n.valor||0);

      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right;color:#6b7280">${pct(v.val)}</td>

      <td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;text-align:right;color:#6b7280">${pct(v.val)}</td>

  const kpiCard = (cor, label, valor, cnt, pctVal) => `

function abrirKpiModal(tipo) {
  const KPI_CFG = {
    vencido:  { label:'Total Vencido',    icon:'📊', color:'#dc2626', bg:'#fef2f2', text:'#991b1b', sub:'Todos os títulos vencidos em aberto' },
    pago:     { label:'Total Pago',       icon:'✅', color:'#16a34a', bg:'#f0fdf4', text:'#14532d', sub:'Títulos liquidados' },
    cobav:    { label:'Cobrança Avançada',icon:'🔔', color:'#c2410c', bg:'#fff7ed', text:'#7c2d12', sub:'Títulos em cobrança avançada (>30 dias)' },
    cartorio: { label:'Aguard. Cartório', icon:'⚖️', color:'#d97706', bg:'#fffbeb', text:'#92400e', sub:'Títulos aguardando envio ao Cartório' },
    protestado:{ label:'Protestado',      icon:'🏛️', color:'#7c3aed', bg:'#f5f3ff', text:'#5b21b6', sub:'Títulos enviados ao Cartório ou Protestados' },
    empcob:   { label:'Emp. Cobrança',   icon:'🏢', color:'#0e7490', bg:'#ecfeff', text:'#164e63', sub:'Títulos em empresa de cobrança' },
    juridico: { label:'Jurídico',         icon:'⚠️', color:'#7f1d1d', bg:'#fef2f2', text:'#7f1d1d', sub:'Títulos em processo jurídico' },
  };

  const cfg = KPI_CFG[tipo];
  if (!cfg) return;

  // Filtrar notas por tipo
  const filtros = {
    vencido:   n => { const s=calcStatus(n); return !['pago','perdido'].includes(s) && diasAtraso(n.vencimento)>0; },
    pago:      n => calcStatus(n)==='pago',
    cobav:     n => calcStatus(n)==='cobranca_avancada',
    cartorio:  n => calcStatus(n)==='aguardando_cartorio',
    protestado:n => ['enviado_cartorio','protestado'].includes(calcStatus(n)),
    empcob:    n => ['emp_cobranca','enviar_juridico'].includes(calcStatus(n)),
    juridico:  n => calcStatus(n)==='juridico',
  };

  const grupo = DB.notas.filter(filtros[tipo]);
  const totalVal = grupo.reduce((s,n)=>s+Number(n.valor||0),0);

  // Para % da inadimplência (exceto 'pago')
  const totalVencidoGeral = DB.notas.filter(filtros['vencido']).reduce((s,n)=>s+Number(n.valor||0),0);
  const pct = tipo !== 'pago' && totalVencidoGeral > 0 ? ((totalVal/totalVencidoGeral)*100).toFixed(1) : null;

  // Ordenar: pago → data de pagamento desc; outros → mais atrasado primeiro
  const sorted = [...grupo].sort((a,b) => {
    if (tipo === 'pago') return (b.dataPagamento||b.vencimento||'').localeCompare(a.dataPagamento||a.vencimento||'');
    return diasAtraso(b.vencimento) - diasAtraso(a.vencimento);
  });

  const rows = sorted.map(n => {
    const s  = calcStatus(n);
    const d  = diasAtraso(n.vencimento);
    const atrasoCell = tipo === 'pago'
      ? `<td style="color:var(--text-muted);font-size:12px">${fmtDate(n.vencimento)}</td>`
      : `<td style="color:${d>30?'var(--danger)':'#d97706'};font-weight:700;text-align:right">${d}d</td>`;
    const tratBadge = n.emTrativaCom ? `<div style="margin-top:3px">${badgeTratativa(n.emTrativaCom)}</div>` : '';
    return `<tr>
      <td><b>${n.cliente}</b></td>
      <td style="color:var(--text-muted);font-size:12px">${n.nf}</td>
      <td style="font-size:12px">${n.empresa||'—'}</td>
      ${atrasoCell}
      <td class="text-right"><b>${fmt(n.valor)}</b></td>
      <td>${statusBadge(s)}${tratBadge}</td>
    </tr>`;
  }).join('');

  const atrasoTh = tipo === 'pago' ? 'Vencimento' : 'Atraso';

  openModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <span style="font-size:28px">${cfg.icon}</span>
      <div>
        <div style="font-size:18px;font-weight:800;color:${cfg.text}">${cfg.label}</div>
        <div style="font-size:12px;color:var(--text-muted)">${cfg.sub}</div>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;padding:14px 18px;background:${cfg.bg};border-radius:10px;border:1px solid ${cfg.color}30">
      <div>
        <div style="font-size:11px;font-weight:700;color:${cfg.text};text-transform:uppercase;letter-spacing:.5px">Valor total</div>
        <div style="font-size:20px;font-weight:800;color:${cfg.color}">${fmt(totalVal)}</div>
      </div>
      <div style="border-left:1px solid ${cfg.color}30;padding-left:16px">
        <div style="font-size:11px;font-weight:700;color:${cfg.text};text-transform:uppercase;letter-spacing:.5px">Títulos</div>
        <div style="font-size:20px;font-weight:800;color:${cfg.color}">${grupo.length}</div>
      </div>
      ${pct !== null ? `<div style="border-left:1px solid ${cfg.color}30;padding-left:16px">
        <div style="font-size:11px;font-weight:700;color:${cfg.text};text-transform:uppercase;letter-spacing:.5px">% da inadimplência</div>
        <div style="font-size:20px;font-weight:800;color:${cfg.color}">${pct}%</div>
      </div>` : ''}
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Cliente</th><th>NF</th><th>Empresa</th><th class="text-right">${atrasoTh}</th><th class="text-right">Valor</th><th>Status</th></tr></thead>
        <tbody>${rows||`<tr><td colspan="6" class="text-center text-muted" style="padding:20px">Nenhum título neste indicador.</td></tr>`}</tbody>
      </table>
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
    </div>
  `);
}

function salvarTrativaCom(id, val) {
  const n = DB.notas.find(x => x.id === id);
  if (!n) return;
  const anterior = n.emTrativaCom || '';
  if (anterior === val) return;
  n.emTrativaCom = val;
  addHist(n, 'Substatus', `Em tratativa com: ${anterior||'—'} → ${val||'—'}`);
  saveDB();
  // Atualiza badge inline se existir
  const badge = document.getElementById(`trat-badge-${id}`);
  if (badge) badge.outerHTML = val ? `<span id="trat-badge-${id}" style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:${getTratativaArea(val)?.bg||'#e5e7eb'};color:${getTratativaArea(val)?.text||'#374151'};border:1px solid ${getTratativaArea(val)?.color||'#9ca3af'}30">${getTratativaArea(val)?.icon||''} ${val}</span>` : `<span id="trat-badge-${id}"></span>`;
}

function salvarObs(id, valor) {
  const n = DB.notas.find(x => x.id === id);
  if (!n) return;
  const texto = valor.trim();
  if (!texto) return; // não registra entrada vazia
  // Só registra se o texto mudou em relação à última entrada do CRM para essa nota
  const ultimaCrm = [...(DB.crm||[])].reverse().find(c => c.notaId === id);
  if (ultimaCrm && ultimaCrm.tratativa === texto) {
    // texto idêntico ao último registro — apenas atualiza o campo visual
  } else {
    // Registra nova tratativa no histórico CRM
    if (!DB.crm) DB.crm = [];
    DB.crm.push({
      id: uid(),
      notaId: id,
      nf: n.nf || '—',
      cliente: n.cliente || '—',
      empresa: n.empresa || '',
      vendedor: n.vendedor || '',
      vencimento: n.vencimento || '',
      valor: n.valor || 0,
      data: new Date().toISOString(),
      tratativa: texto
    });
  }
  n.obs = ''; // campo sempre vazio após salvar — histórico fica no CRM
  saveDB();
  // Mantém campo vazio e amarelo (indica que tem histórico)
  const inputs = document.querySelectorAll(`input[onblur*="${id}"]`);
  inputs.forEach(inp => {
    inp.value = '';
    inp.style.background = '#fefce8';
    inp.placeholder = '+ Nova tratativa...';
  });
}

function excluirNota(id) {
  const n = DB.notas.find(x => x.id === id);
  if (!n) return;
  if (!confirm(`Excluir a nota ${n.nf || id} do cliente "${n.cliente}"?\n\nEssa ação não pode ser desfeita.`)) return;
  DB.notas = DB.notas.filter(x => x.id !== id);
  saveDB();
  filterVencidos();
}

function flagCartorio(id) {
  const n = DB.notas.find(x=>x.id===id); if(!n) return;
  const dt = prompt('Confirmar envio ao Cartório.\nData de envio (AAAA-MM-DD):', today());
  if (!dt) return;
  n.dataCartorio = dt;
  addHist(n, 'Cartório', `Enviado ao Cartório em ${dt}`);
  saveDB(); filterVencidos(); alert('✅ Atualizado para "Enviado p/ Cartório"');
}

function setBase(id, status) {

function exportVencidos() {

function fillTmpl(str, nota) {
  if (!str) return '';
  const d = diasAtraso(nota.vencimento);
  return str
    .replace(/\{\{nf\}\}/g, nota.nf||'')
    .replace(/\{\{cliente\}\}/g, nota.cliente||'')
    .replace(/\{\{vendedor\}\}/g, nota.vendedor||'')
    .replace(/\{\{valor\}\}/g, fmt(nota.valor))
    .replace(/\{\{vencimento\}\}/g, fmtDate(nota.vencimento))
    .replace(/\{\{dias\}\}/g, d)
    .replace(/\{\{empresa\}\}/g, DB.config.empresaNome||'Reconlog')
    .replace(/\{\{data\}\}/g, new Date().toLocaleDateString('pt-BR'));
}

function sendEmail(id) {
  const n=DB.notas.find(x=>x.id===id); if(!n) return;
  const s=calcStatus(n);
  const tmpl=DB.templates[s==='cobranca_simples'?'cobranca_simples':'cobranca_avancada']||{};
  const cli=getCliente(n.cliente);
  const emailsCli=getEmailsCliente(cli);
  if(!emailsCli.length){alert('⚠️ Cliente sem e-mail cadastrado. Acesse Cadastro de Clientes.');return;}
  const emailsStr=emailsCli.join(', ');
  const emailsParam=emailsCli.join(',');

  const assunto = fillTmpl(tmpl.emailSubj||'',n);
  const corpo   = fillTmpl(tmpl.emailBody||'',n);

  openModal(`
    <h2>✉️ Relatório de Cobrança — ${n.nf||'NF'}</h2>
    <div class="alert alert-info" style="margin-bottom:14px">
      Para: <b>${emailsStr}</b> &nbsp;|&nbsp; Cliente: <b>${n.cliente}</b> &nbsp;|&nbsp; NF: <b>${n.nf}</b> &nbsp;|&nbsp; Valor: <b>${fmt(n.valor)}</b>
    </div>

      <label>Corpo da mensagem <span style="font-weight:400;color:var(--text-muted)">(editável antes do envio)</span></label>

    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:10px">O e-mail será aberto no seu cliente de e-mail (Outlook) com o texto acima já preenchido. Você poderá revisar antes de enviar.</p>

function dispararEmail(id, emailsParam) {
  const emails=(emailsParam||'').split(',').map(e=>e.trim()).filter(Boolean);
  const subj  = document.getElementById('em-subj')?.value||'';
  const corpo = document.getElementById('em-body')?.value||'';
  window.open(`mailto:${emails.join(',')}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(corpo)}`);
  const n=DB.notas.find(x=>x.id===id);
  if(n){ addHist(n,'E-mail',`Relatório enviado para ${emails.join(', ')}`); saveDB(); }
  closeModal();
}

function sendWhatsApp(id) {
  const n=DB.notas.find(x=>x.id===id); if(!n) return;
  const s=calcStatus(n);
  const tmpl=DB.templates[s==='cobranca_simples'?'cobranca_simples':'cobranca_avancada']||{};
  const cli=getCliente(n.cliente);
  const phone=cli?.whats||'';
  if(!phone){alert('⚠️ Cliente sem WhatsApp cadastrado.');return;}
  const msg=fillTmpl(tmpl.whatsApp,n);
  const cfg=DB.config;
  if(cfg.evoUrl&&cfg.evoInstance&&cfg.evoToken){
    fetch(`${cfg.evoUrl}/message/sendText/${cfg.evoInstance}`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':cfg.evoToken},
      body:JSON.stringify({number:phone.replace(/\D/g,''),text:msg})
    }).then(r=>{
      if(r.ok){addHist(n,'WhatsApp',`Enviado via Evolution API para ${phone}`);saveDB();alert('✅ Mensagem enviada!');}
      else throw new Error();
    }).catch(()=>alert('❌ Erro na Evolution API. Verifique as configurações.'));
  } else {
    window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
    addHist(n,'WhatsApp',`Link WhatsApp gerado para ${phone}`); saveDB();
  }
}

            const qtd=DB.notas.filter(n=>n.vendedor===o.nome).length;

          }).join('')}
        </select>

      <button class="btn btn-danger btn-sm" onclick="mesclarVendedor('${id}')">🔀 Mesclar</button>

      <div class="form-group"><label>E-mail</label><input id="vf-email" type="email" value="${v?.email||''}"></div>

      <div class="form-group"><label>Situação</label><select id="vf-sit">
        <option ${!v?.situacao||v.situacao==='Ativo'?'selected':''}>Ativo</option>
        <option ${v?.situacao==='Inativo'?'selected':''}>Inativo</option>
      </select></div>
    </div>

function mesclarVendedor(idPrincipal) {
  const idDup = document.getElementById('vf-mesclar')?.value;
  if (!idDup) { alert('Selecione o cadastro duplicado a remover.'); return; }
  const principal = DB.vendedores.find(x=>x.id===idPrincipal);
  const duplicado = DB.vendedores.find(x=>x.id===idDup);
  if (!principal || !duplicado) return;
  const qtd = DB.notas.filter(n=>n.vendedor===duplicado.nome).length;
  const qtdCli = DB.clientes.filter(c=>c.vend1===duplicado.nome).length;
  if (!confirm(`Mesclar "${duplicado.nome}" em "${principal.nome}"?\n\n• ${qtd} lançamento(s) serão transferidos\n• ${qtdCli} cliente(s) serão atualizados\n• O cadastro "${duplicado.nome}" será excluído\n\nEsta ação não pode ser desfeita.`)) return;
  // Transfere lançamentos
  DB.notas.forEach(n => { if (n.vendedor === duplicado.nome) n.vendedor = principal.nome; });
  // Transfere vínculos de clientes
  DB.clientes.forEach(c => { if (c.vend1 === duplicado.nome) c.vend1 = principal.nome; });
  // Remove o duplicado
  DB.vendedores = DB.vendedores.filter(x=>x.id!==idDup);
  saveDB();
  closeModal();
  renderVendedores();
  alert(`✅ Mesclagem concluída!\n• ${qtd} lançamento(s) transferido(s)\n• ${qtdCli} cliente(s) atualizado(s)\n• "${duplicado.nome}" removido`);
}

function saveVend(id){
  const nome=document.getElementById('vf-nome').value.trim();
  if(!nome){alert('Nome obrigatório');return;}
  const d={nome,email:document.getElementById('vf-email').value.trim(),whats:document.getElementById('vf-whats').value.trim(),situacao:document.getElementById('vf-sit').value};
  if(id){Object.assign(DB.vendedores.find(x=>x.id===id),d);}
  else{DB.vendedores.push({id:uid(),...d});}
  saveDB();closeModal();renderVendedores();
}
function delVendedor(id){if(!confirm('Excluir?'))return;DB.vendedores=DB.vendedores.filter(x=>x.id!==id);saveDB();renderVendedores();}

        <thead><tr><th>Nome</th><th>CPF/CNPJ</th><th>E-mail</th><th>WhatsApp</th><th>Vendedores</th><th>Situação</th><th>Ações</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="7" class="text-center text-muted" style="padding:20px">Nenhum cliente cadastrado</td></tr>'}</tbody>
      </table></div>
    </div>`;
}

function vendOpts(sel){return['','...'+DB.vendedores.map(v=>v.nome)].flat().filter(n=>n!=='').map(n=>`<option ${n===sel?'selected':''}>${n}</option>`).join('');}
// Rewrite vendOpts properly
function buildVendOpts(sel){
  const opts=['<option value="">Nenhum</option>'];
  DB.vendedores.forEach(v=>opts.push(`<option ${v.nome===sel?'selected':''}>${v.nome}</option>`));
  return opts.join('');
}

function openCliForm(id){
  const c=id?DB.clientes.find(x=>x.id===id):{};
  openModal(`<h2>${id?'Editar':'Novo'} Cliente</h2>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1"><label>Nome / Razão Social *</label><input id="cf-nome" value="${c?.nome||''}"></div>
      <div class="form-group"><label>CPF / CNPJ</label><input id="cf-doc" value="${c?.doc||''}"></div>
      <div class="form-group" style="grid-column:1/-1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label style="margin:0">E-mails de Cobrança</label>
          <button type="button" class="btn btn-ghost btn-xs" onclick="addEmailCliExtra()">+ Adicionar e-mail</button>
        </div>
        <div id="cf-emails-list">${buildEmailsCliRows(c)}</div>
      </div>
      <div class="form-group"><label>E-mail Jurídico</label><input id="cf-ejur" type="email" value="${c?.emailJur||''}"></div>
      <div class="form-group" style="grid-column:1/-1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label style="margin:0">📱 WhatsApp</label>
          <button type="button" class="btn btn-ghost btn-xs" onclick="addWhatsCliExtra()">+ Adicionar número</button>
        </div>
        <div id="cf-whats-list">${buildWhatsCliRows(c)}</div>
      </div>
      <div class="form-group"><label>Vendedor 1</label><select id="cf-v1">${buildVendOpts(c?.vend1||'')}</select></div>

      <div class="form-group"><label>Situação</label><select id="cf-sit">
        <option ${!c?.situacao||c.situacao==='Ativo'?'selected':''}>Ativo</option>
        <option ${c?.situacao==='Inativo'?'selected':''}>Inativo</option>
      </select></div>
      <div class="form-group" style="grid-column:1/-1"><label>Observações</label><textarea id="cf-obs">${c?.obs||''}</textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveCli('${id||''}')">💾 Salvar</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`);
}
function editCliente(id){openCliForm(id);}
function saveCli(id){
  const nome=document.getElementById('cf-nome').value.trim();
  if(!nome){alert('Nome obrigatório');return;}
  const emailInputs=[...document.querySelectorAll('.cf-email-row-input')].map(i=>i.value.trim()).filter(Boolean);
  const email=emailInputs[0]||'';
  const emailsAdicionais=emailInputs.slice(1);
  const whatsInputs=[...document.querySelectorAll('.cf-whats-row-input')].map(i=>i.value.trim()).filter(Boolean);
  const whats=whatsInputs[0]||'';
  const whatsAdicionais=whatsInputs.slice(1);
  const d={nome,doc:document.getElementById('cf-doc').value.trim(),email,emailsAdicionais,emailJur:document.getElementById('cf-ejur').value.trim(),whats,whatsAdicionais,vend1:document.getElementById('cf-v1').value,situacao:document.getElementById('cf-sit').value,obs:document.getElementById('cf-obs').value.trim()};
  if(id){Object.assign(DB.clientes.find(x=>x.id===id),d);}else{DB.clientes.push({id:uid(),...d});}
  saveDB();closeModal();renderClientes();
}
function delCliente(id){if(!confirm('Excluir?'))return;DB.clientes=DB.clientes.filter(x=>x.id!==id);saveDB();renderClientes();}

function baixarPlanilhaClientes() {
  const bin = atob(_MODELO_CLIENTES_B64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const blob = new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Modelo_Importacao_Clientes.xlsx';
  a.click();
  URL.revokeObjectURL(a.href);
}
